function ScreenshotImportModal({ onImport, onClose, showToast }) {
  const [file, setFile] = useState(null);
  const [previewUrl, setPreviewUrl] = useState('');
  const [loading, setLoading] = useState(false);
  const [progressText, setProgressText] = useState('');
  const [rawText, setRawText] = useState('');
  const [drafts, setDrafts] = useState([]);
  const [lastMethod, setLastMethod] = useState('');
  const [recognizeError, setRecognizeError] = useState('');
  const [showAiConfig, setShowAiConfig] = useState(false);
  const [aiForm, setAiForm] = useState(() => readAiConfig());
  const [showAiKey, setShowAiKey] = useState(false);
  const [aiConfigTesting, setAiConfigTesting] = useState(false);
  const [aiConfigTestStatus, setAiConfigTestStatus] = useState(null);

  function updateDraft(index, field, value) {
    setDrafts(prev => prev.map((item, idx) => {
      if (idx !== index) return item;
      const next = { ...item, [field]: value };
      const unitPrice = field === 'unitPrice' ? (value === '' ? null : parseFloat(value)) : item.unitPrice;
      const qty = field === 'qty' ? (value === '' ? 1 : parseInt(value, 10) || 1) : item.qty;
      next.unitPrice = unitPrice;
      next.qty = qty;
      next.cost = unitPrice === null ? 0 : round2(unitPrice * qty);
      return next;
    }));
  }

  function removeDraft(index) {
    setDrafts(prev => prev.filter((_, idx) => idx !== index));
  }

  function updateAiForm(field, value) {
    setAiForm(prev => normalizeAiConfig({ ...prev, [field]: value }));
    setAiConfigTestStatus(null);
  }

  function handleSaveAiConfig() {
    const saved = saveAiConfig(aiForm);
    setAiForm(saved);
    setShowAiKey(false);
    setShowAiConfig(false);
    showToast(hasAiCredentials(saved) ? '已保存 AI 直连配置' : '已保存配置；未填写 Key 时会使用 Supabase');
  }

  function handleResetAiConfig() {
    clearAiConfig();
    const resetConfig = { ...AI_DEFAULT_CONFIG };
    setAiForm(resetConfig);
    setShowAiKey(false);
    setAiConfigTestStatus(null);
    showToast('已清空 AI 直连配置');
  }

  async function handleTestAiConfig() {
    const config = normalizeAiConfig(aiForm);
    setAiConfigTesting(true);
    setAiConfigTestStatus(null);
    try {
      const result = await testDirectAiConnection(config);
      setAiConfigTestStatus({
        type: 'ok',
        message: `连接成功：${result.model || config.model} 返回 ${String(result.responseText || 'OK').slice(0, 60)}`
      });
      showToast('AI API 测试连接成功');
    } catch (error) {
      const message = getDirectAiErrorMessage(error);
      setAiConfigTestStatus({
        type: 'error',
        message: `连接失败：${message}`
      });
      showToast(`AI API 连接失败：${message}`);
    } finally {
      setAiConfigTesting(false);
    }
  }

  function handleFileChange(selectedFile) {
    if (!selectedFile) return;
    setFile(selectedFile);
    setRawText('');
    setDrafts([]);
    setLastMethod('');
    setRecognizeError('');
    const reader = new FileReader();
    reader.onload = ev => setPreviewUrl(String(ev.target?.result || ''));
    reader.readAsDataURL(selectedFile);
  }

  useEffect(() => {
    function handlePaste(event) {
      const items = Array.from(event.clipboardData?.items || []);
      const imageItem = items.find(item => item.kind === 'file' && item.type.startsWith('image/'));
      if (!imageItem) return;

      const pastedFile = imageItem.getAsFile();
      if (!pastedFile) {
        showToast('剪贴板里没有可用图片');
        return;
      }

      event.preventDefault();
      const extension = (pastedFile.type.split('/')[1] || 'png').replace('jpeg', 'jpg');
      const screenshotFile = new File([pastedFile], `clipboard-screenshot-${Date.now()}.${extension}`, {
        type: pastedFile.type || 'image/png'
      });
      handleFileChange(screenshotFile);
      showToast('已粘贴截图，可以开始识别');
    }

    window.addEventListener('paste', handlePaste);
    return () => window.removeEventListener('paste', handlePaste);
  }, []);

  function normalizeRecognizedDrafts(items) {
    return items
      .map(item => ({
        ...item,
        name: String(item.name || '').trim(),
        cardCode: String(item.cardCode || '').trim(),
        note: String(item.note || '').trim(),
        sourceText: String(item.sourceText || '').trim(),
        unitPrice: item.unitPrice === '' ? null : item.unitPrice,
        qty: parseInt(item.qty, 10) || 1,
        status: item.status || '未售出',
        source: item.source || '截图识别',
        sells: [],
        profit: null,
        cost: item.unitPrice === null || item.unitPrice === '' ? 0 : round2((parseFloat(item.unitPrice) || 0) * (parseInt(item.qty, 10) || 1))
      }))
      .filter(item => item.name);
  }

  async function handleRecognizeLocal() {
    if (!file) {
      showToast('请先上传截图');
      return;
    }
    if (!window.Tesseract) {
      showToast('OCR 组件加载失败，请刷新后重试');
      return;
    }

    setLoading(true);
    setLastMethod('本地OCR');
    setProgressText('正在识别文字...');
    setRawText('');
    setDrafts([]);
    setRecognizeError('');

    try {
      const result = await window.Tesseract.recognize(file, 'chi_sim+eng', {
        logger(message) {
          if (message?.status === 'recognizing text') {
            const pct = message.progress ? Math.round(message.progress * 100) : 0;
            setProgressText(`正在识别文字... ${pct}%`);
          } else if (message?.status) {
            setProgressText(String(message.status));
          }
        }
      });
      const text = result?.data?.text || '';
      const words = Array.isArray(result?.data?.words) ? result.data.words : [];
      setRawText(text);
      const parsedFromWords = parseProductsFromOcrWords(words);
      const parsed = parsedFromWords.length > 0 ? parsedFromWords : parseProductsFromScreenshotText(text);
      const enriched = await enrichRecognizedItemsWithImages(parsed);
      setDrafts(enriched);
      if (enriched.length === 0) {
        showToast('没有识别出可导入的商品，请检查截图是否清晰');
      } else {
        showToast(`已识别 ${enriched.length} 条商品，请确认后导入`);
      }
    } catch (error) {
      console.error('截图识别失败', error);
      setRecognizeError(error?.message || '截图识别失败');
      showToast(error?.message || '截图识别失败');
    } finally {
      setLoading(false);
      setProgressText('');
    }
  }

  async function handleRecognizeAi() {
    if (!file || !previewUrl) {
      showToast('请先上传截图');
      return;
    }

    setLoading(true);
    setLastMethod('AI识别');
    setProgressText('正在压缩截图...');
    setRawText('');
    setDrafts([]);
    setRecognizeError('');

    try {
      const imageForAi = await compressImageDataUrl(previewUrl);
      setProgressText('正在调用 AI 识别截图...');
      const result = await extractScreenshotItemsViaAi(imageForAi);
      const normalized = normalizeRecognizedDrafts(result.items || []);
      const enriched = await enrichRecognizedItemsWithImages(normalized);
      setDrafts(enriched);
      setRawText(result.rawText || '');
      setLastMethod(result.source ? `AI识别 - ${result.source}` : 'AI识别');
      if (enriched.length === 0) {
        showToast('AI 没有识别出可导入商品，请换一张更清晰的截图试试');
      } else {
        showToast(`AI 已识别 ${enriched.length} 条商品，请确认后导入`);
      }
    } catch (error) {
      console.error('AI 截图识别失败', error);
      setRecognizeError(error?.message || 'AI 截图识别失败');
      showToast(error?.message || 'AI 截图识别失败');
    } finally {
      setLoading(false);
      setProgressText('');
    }
  }

  function handleImport() {
    const normalized = normalizeRecognizedDrafts(drafts);

    if (normalized.length === 0) {
      showToast('请至少保留一条有效商品');
      return;
    }
    onImport(normalized);
  }

  return (
    <ModalPortal>
      <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
        <div className="modal" style={{maxWidth: 860}}>
          <div className="modal-header">
            <div className="modal-title">🧠 截图识别新增</div>
            <button className="modal-close" onClick={onClose}>×</button>
          </div>
          <div className="modal-body">
          <div className="modal-section-title">上传截图</div>
          <div style={{display:'flex', gap:16, alignItems:'flex-start', flexWrap:'wrap'}}>
              <label style={{minWidth:180, minHeight:180, border:'1px dashed var(--border-bright)', borderRadius:24, background:'rgba(17,17,17,0.92)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', overflow:'hidden'}}>
              {previewUrl ? (
                <img src={previewUrl} alt="截图预览" style={{width:'100%', height:'100%', objectFit:'contain', background:'#111111'}} />
              ) : (
                <div style={{textAlign:'center', color:'var(--text-2)', padding:16}}>
                  <div style={{fontSize:32, marginBottom:8}}>🖼️</div>
                  <div>点击上传截图</div>
                </div>
              )}
              <input type="file" accept="image/*" style={{display:'none'}} onChange={e => handleFileChange(e.target.files?.[0])} />
            </label>
            <div style={{flex:'1 1 320px', minWidth:260}}>
              <div style={{fontSize:13, color:'var(--text-2)', lineHeight:1.7, marginBottom:12}}>
                支持识别截图里的卡名、编号、价格和数量。可以点击选择截图，也可以直接 Ctrl/⌘ + V 粘贴截图。推荐优先用 AI 识别；本地 OCR 继续保留，适合作为备用方案。
              </div>
              <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
                <button className="btn btn-primary" onClick={handleRecognizeAi} disabled={!file || loading}>
                  {loading && lastMethod === 'AI识别' ? 'AI 识别中...' : 'AI识别（推荐）'}
                </button>
                <button className="btn btn-secondary" onClick={handleRecognizeLocal} disabled={!file || loading}>
                  {loading && lastMethod === '本地OCR' ? 'OCR 识别中...' : '本地OCR'}
                </button>
                <button className="btn btn-secondary" onClick={() => setShowAiConfig(true)} disabled={loading}>
                  AI配置
                </button>
                <label className="btn btn-secondary" style={{cursor:'pointer'}}>
                  重新选图
                  <input type="file" accept="image/*" style={{display:'none'}} onChange={e => handleFileChange(e.target.files?.[0])} />
                </label>
              </div>
              {progressText && (
                <div style={{marginTop:10, fontSize:12, color:'var(--primary)', fontWeight:700}}>{progressText}</div>
              )}
              {recognizeError && (
                <div className="auth-error" style={{marginTop:12}}>
                  {recognizeError}
                </div>
              )}
            </div>
          </div>

          {drafts.length > 0 && (
            <>
              <div className="modal-section-title" style={{marginTop:20}}>识别结果确认</div>
              {lastMethod && (
                <div style={{marginBottom:10, fontSize:12, color:'var(--text-2)'}}>
                  当前结果来源：<span style={{color:'var(--primary)', fontWeight:800}}>{lastMethod}</span>
                </div>
              )}
              <div style={{display:'flex', flexDirection:'column', gap:12}}>
                {drafts.map((item, index) => (
                  <div key={`${item.cardCode || item.name}-${index}`} style={{border:'1px solid var(--border)', borderRadius:22, padding:14, background:'rgba(17,17,17,0.92)'}}>
                    <div style={{display:'grid', gridTemplateColumns:'72px 1.4fr 1fr 0.8fr 0.7fr auto', gap:10, alignItems:'center'}}>
                      <div style={{width:72, height:72, borderRadius:18, border:'1px solid var(--border)', background:'#111111', display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden'}}>
                        {item.imageUrl ? (
                          <img src={item.imageUrl} alt={item.name} style={{width:'100%', height:'100%', objectFit:'contain'}} />
                        ) : (
                          <span style={{fontSize:26}}>🃏</span>
                        )}
                      </div>
                      <input className="form-input" value={item.name} onChange={e => updateDraft(index, 'name', e.target.value)} placeholder="卡牌名称" />
                      <input className="form-input" value={item.cardCode || ''} onChange={e => updateDraft(index, 'cardCode', e.target.value)} placeholder="卡牌编号" />
                      <input className="form-input" type="number" step="0.01" value={item.unitPrice ?? ''} onChange={e => updateDraft(index, 'unitPrice', e.target.value)} placeholder="单价" />
                      <input className="form-input" type="number" min="1" value={item.qty ?? 1} onChange={e => updateDraft(index, 'qty', e.target.value)} placeholder="数量" />
                      <button className="btn btn-secondary" onClick={() => removeDraft(index)} style={{color:'#f87171', borderColor:'rgba(248,81,73,0.3)'}}>删除</button>
                    </div>
                    <div style={{marginTop:8, fontSize:12, color:'var(--text-2)'}}>
                      成本会按 单价 × 数量 自动生成，导入后状态默认设为“未售出”。
                    </div>
                    {(item.note || item.sourceText) && (
                      <div style={{marginTop:8, display:'flex', gap:12, flexWrap:'wrap', fontSize:12, color:'var(--text-2)'}}>
                        {item.note ? <span>备注：{item.note}</span> : null}
                        {item.sourceText ? <span>识别依据：{item.sourceText}</span> : null}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </>
          )}

          {rawText && (
            <>
              <div className="modal-section-title" style={{marginTop:20}}>{lastMethod.startsWith('AI识别') ? 'AI 原始输出' : 'OCR 原始文本'}</div>
              <textarea
                className="form-input"
                style={{minHeight:140, resize:'vertical', fontFamily:'var(--mono, monospace)'}}
                value={rawText}
                onChange={e => setRawText(e.target.value)}
              />
            </>
          )}
          </div>
          <div className="modal-footer">
            <button className="btn btn-secondary" onClick={onClose}>取消</button>
            <button className="btn btn-primary" onClick={handleImport} disabled={drafts.length === 0}>导入 {drafts.length || ''} 条记录</button>
          </div>
        </div>
      </div>
      {showAiConfig && (
        <AiConfigModal
          config={aiForm}
          testing={aiConfigTesting}
          testStatus={aiConfigTestStatus}
          showApiKey={showAiKey}
          onChange={updateAiForm}
          onSave={handleSaveAiConfig}
          onReset={handleResetAiConfig}
          onTest={handleTestAiConfig}
          onToggleShowApiKey={() => setShowAiKey(prev => !prev)}
          onClose={() => setShowAiConfig(false)}
        />
      )}
    </ModalPortal>
  );
}

// Add Card Form — 简化版
function AddCardForm({ onAdd, onCancel }) {
  const [form, setForm] = useState({
    name: '', unitPrice: '', qty: '1', cost: '', cardLanguage: '',
    isPsa10: false,
    status: '未售出',
    sells: []
  });
  
  // 成本自动计算 = 单价 × 数量
  function update(field, value) {
    setForm(prev => {
      const next = { ...prev, [field]: value };
      if (field === 'unitPrice' || field === 'qty') {
        const price = parseFloat(field === 'unitPrice' ? value : prev.unitPrice) || 0;
        const qty = parseInt(field === 'qty' ? value : prev.qty) || 1;
        next.cost = String((price * qty).toFixed(2));
      }
      return next;
    });
  }
  
  function handleSubmit(e) {
    e.preventDefault();
    if (!form.name.trim()) return;
    const cost = form.cost === '' ? 0 : parseFloat(form.cost);
    const totalSell = form.sells.reduce((sum, s) => sum + (s.total || 0), 0);
    onAdd({
      name: form.name.trim(),
      unitPrice: form.unitPrice === '' ? null : parseFloat(form.unitPrice),
      qty: form.qty === '' ? 1 : parseInt(form.qty),
