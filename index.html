<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡价管理后台</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Manrope:wght@400;500;600;700&family=Nunito:wght@500;600;700;800;900&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #171717;
      --surface: rgba(23, 23, 23, 0.92);
      --surface-solid: #171717;
      --surface-2: rgba(15, 15, 15, 0.92);
      --surface-3: #111111;
      --primary: #3ecf8e;
      --primary-light: #00c573;
      --primary-dim: rgba(62, 207, 142, 0.12);
      --accent: #3ecf8e;
      --accent-dim: rgba(62, 207, 142, 0.12);
      --green: #3ecf8e;
      --green-bg: rgba(62, 207, 142, 0.1);
      --green-border: rgba(62, 207, 142, 0.3);
      --orange: #f59e0b;
      --orange-bg: rgba(245, 158, 11, 0.1);
      --orange-border: rgba(245, 158, 11, 0.25);
      --red: #fb7185;
      --red-bg: rgba(251, 113, 133, 0.12);
      --red-border: rgba(251, 113, 133, 0.24);
      --text: #fafafa;
      --text-2: #b4b4b4;
      --text-3: #898989;
      --border: #2e2e2e;
      --border-bright: rgba(62, 207, 142, 0.3);
      --shadow-sm: none;
      --shadow: none;
      --shadow-lg: 0 14px 42px rgba(0, 0, 0, 0.35);
      --radius: 16px;
      --radius-sm: 8px;
      --radius-pill: 9999px;
      --mono-font: 'Source Code Pro', 'SF Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Manrope', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      padding-top: 82px;
      background-image:
        radial-gradient(circle at 0% 0%, rgba(62, 207, 142, 0.08) 0%, transparent 26%),
        radial-gradient(circle at 100% 18%, rgba(99, 102, 241, 0.06) 0%, transparent 24%);
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
    }
    #root { min-height: 100vh; position: relative; z-index: 1; }

    .header {
      background: rgba(23, 23, 23, 0.9);
      border-bottom: 1px solid #242424;
      padding: 0 32px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 40;
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 82px;
      gap: 16px;
      padding: 14px 0;
    }
    .header-title {
      font-family: 'Manrope', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 24px;
      font-weight: 400;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: -0.02em;
    }
    .header-title .logo {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
    }
    .header-title .logo svg {
      border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(62, 207, 142, 0.18);
    }
    .header-title small {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-3);
      letter-spacing: 0;
    }
    .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

    .page-tabs {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 32px 8px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .header-status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: #0f0f0f;
      color: var(--text-2);
      font-size: 12px;
      font-weight: 500;
    }

    .btn {
      padding: 10px 16px;
      border-radius: var(--radius-pill);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Manrope', sans-serif;
      transition: all 0.18s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn-primary {
      background: #0f0f0f;
      color: #fafafa;
      border: 1px solid #fafafa;
    }
    .btn-primary:hover {
      background: #151515;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: #0f0f0f;
      color: var(--text-2);
      border: 1px solid #2e2e2e;
    }
    .btn-secondary:hover {
      background: #111111;
      color: #fafafa;
      border-color: #393939;
      transform: translateY(-1px);
    }
    .btn-danger { background: rgba(127,29,29,0.18); color: var(--red) !important; border: 1px solid var(--red-border); }
    .btn-danger:hover { background: rgba(127,29,29,0.28); }
    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border);
      padding: 6px 10px;
      font-size: 12px;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.02); color: var(--text); }
    .btn-gold-soft {
      background: #0f0f0f;
      color: #fafafa;
      border: 1px solid #2e2e2e;
    }
    .btn-green-soft {
      background: #0f0f0f;
      color: var(--green);
      border: 1px solid var(--green-border);
    }

    .stats-bar {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 32px 8px;
      display: grid;
      position: sticky;
      position: -webkit-sticky;
      top: 82px;
      z-index: 20;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      background: linear-gradient(180deg, rgba(23, 23, 23, 0.98) 78%, rgba(23, 23, 23, 0.9) 100%);
      backdrop-filter: blur(12px) saturate(110%);
      -webkit-backdrop-filter: blur(12px) saturate(110%);
      border-bottom: 1px solid #242424;
    }
    .stat-card {
      background: #171717;
      border-radius: 16px;
      padding: 20px 22px;
      border: 1px solid #2e2e2e;
      transition: transform 0.25s ease, border-color 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.primary::before,
    .stat-card.green::before,
    .stat-card.blue::before,
    .stat-card.accent::before { background: linear-gradient(90deg, #3ecf8e, rgba(62,207,142,0.18)); }
    .stat-card.orange::before { background: linear-gradient(90deg, #f59e0b, rgba(245,158,11,0.18)); }
    .stat-card.red::before { background: linear-gradient(90deg, #fb7185, rgba(251,113,133,0.18)); }
    .stat-card:hover {
      transform: translateY(-2px);
      border-color: #393939;
    }
    .stat-label {
      font-family: var(--mono-font);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: 'Manrope', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 24px;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .stat-value.green { color: var(--green); }
    .stat-value.orange { color: var(--orange); }
    .stat-sub { font-size: 12px; color: var(--text-3); margin-top: 8px; font-weight: 400; }
    .stat-detail {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #242424;
    }
    .stat-detail-label {
      font-size: 11px;
      color: var(--text-3);
      margin-bottom: 4px;
      font-weight: 500;
    }
    .stat-detail-note {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 4px;
      font-weight: 400;
    }

    .toolbar-select {
      padding: 10px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: #0f0f0f;
      color: var(--text-2);
      font-size: 13px;
      font-weight: 500;
      font-family: 'Manrope', sans-serif;
      cursor: pointer;
      outline: none;
    }
    .toolbar-select:focus {
      border-color: rgba(62, 207, 142, 0.3);
      box-shadow: 0 0 0 1px rgba(62, 207, 142, 0.3);
    }
    .thumb-shell {
      border-radius: 12px;
      border: 1px solid #2e2e2e;
      background: #111111;
    }

    .toolbar {
      max-width: 1400px;
      margin: 0 auto 18px;
      padding: 16px 32px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .table-sticky-wrapper {
      position: sticky;
      position: -webkit-sticky;
      top: 182px;
      z-index: 15;
      background: linear-gradient(180deg, rgba(23,23,23,0.98) 0%, rgba(23,23,23,0.92) 100%);
    }
    .search-box { flex: 1; min-width: 240px; position: relative; }
    .search-box input {
      width: 100%;
      padding: 13px 18px 13px 44px;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      font-size: 14px;
      font-family: 'Manrope', sans-serif;
      outline: none;
      transition: all 0.2s;
      background: #111111;
      color: var(--text);
    }
    .search-box input:focus { border-color: rgba(62,207,142,0.45); box-shadow: 0 0 0 1px rgba(62,207,142,0.3); }
    .search-box input::placeholder { color: var(--text-3); }
    .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-3); pointer-events: none; }
    .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      padding: 10px 15px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: #111111;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Manrope', sans-serif;
      color: var(--text-2);
      transition: all 0.18s ease;
    }
    .filter-btn:hover { border-color: rgba(62,207,142,0.3); color: var(--primary); background: rgba(255,255,255,0.02); }
    .filter-btn.active { background: rgba(62,207,142,0.12); color: var(--primary); border-color: rgba(62,207,142,0.3); font-weight: 500; }
    .filter-btn.active-green { background: var(--green-bg); color: var(--green); border-color: var(--green-border); font-weight: 500; }
    .filter-btn.active-orange { background: var(--orange-bg); color: var(--orange); border-color: var(--orange-border); font-weight: 500; }

    .table-container { max-width: 1400px; margin: 0 auto 48px; padding: 0 32px; }
    .table-wrap {
      background: #171717;
      border-radius: 16px;
      border: 1px solid #2e2e2e;
      overflow-x: auto;
      overflow-y: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    .main-card-table { min-width: 1460px; }
    .old-card-table { min-width: 1080px; }
    thead { background: #111111; }
    th {
      padding: 14px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
      font-family: var(--mono-font);
      text-transform: uppercase;
    }
    th:hover { color: var(--primary); }
    th.sorted { color: var(--primary); }
    th .sort-icon { margin-left: 4px; font-size: 10px; opacity: 0.6; }
    td {
      padding: 14px 16px;
      border-bottom: 1px solid #242424;
      vertical-align: middle;
      font-size: 13px;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    tr.status-sold td { background: var(--green-bg); }
    tr.status-sold:hover td { background: rgba(62,207,142,0.14); }
    tr.status-partial td { background: rgba(245,158,11,0.08); }
    tr.status-partial:hover td { background: rgba(245,158,11,0.13); }
    tr.status-signed td { background: var(--orange-bg); }
    tr.status-signed:hover td { background: rgba(245,158,11,0.14); }
    th.action-col,
    td.action-col {
      position: sticky;
      right: 0;
      z-index: 2;
      min-width: 188px;
      background: #171717;
      box-shadow: -12px 0 18px rgba(0,0,0,0.22);
    }
    th.action-col { z-index: 4; background: #111111; }
    tr:hover td.action-col { background: #1c1c1c; }
    tr.status-sold td.action-col { background: var(--green-bg); }
    tr.status-sold:hover td.action-col { background: rgba(62,207,142,0.14); }
    tr.status-partial td.action-col { background: rgba(245,158,11,0.08); }
    tr.status-partial:hover td.action-col { background: rgba(245,158,11,0.13); }
    tr.status-signed td.action-col { background: var(--orange-bg); }
    tr.status-signed:hover td.action-col { background: rgba(245,158,11,0.14); }
    .row-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      white-space: nowrap;
    }
    .action-btn-listing {
      color: var(--green);
      border-color: var(--green-border);
      background: var(--green-bg);
    }
    .action-btn-listing:hover {
      color: var(--primary-light);
      border-color: rgba(62,207,142,0.48);
      background: rgba(62,207,142,0.18);
    }
    .listing-copy-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .listing-field {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0f0f0f;
      padding: 10px 12px;
    }
    .listing-label {
      display: block;
      margin-bottom: 5px;
      font-size: 11px;
      color: var(--text-3);
      font-family: var(--mono-font);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .listing-value {
      min-height: 20px;
      color: var(--text);
      font-weight: 600;
      word-break: break-word;
    }

    .card-name { font-weight: 500; font-size: 15px; color: var(--text); }
    .card-name-line {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .price-meta {
      display: block;
      margin-top: 3px;
      color: var(--text-3);
      font-size: 10px;
      font-family: var(--mono-font);
      white-space: nowrap;
    }
    .price-delta {
      display: block;
      margin-top: 3px;
      font-size: 10px;
      font-family: var(--mono-font);
      white-space: nowrap;
    }
    .price-delta.up { color: var(--green); }
    .price-delta.down { color: var(--red); }
    .price-delta.flat { color: var(--text-3); }
    .unit-ref-delta {
      display: block;
      margin-top: 4px;
      font-size: 10px;
      font-family: var(--mono-font);
      white-space: nowrap;
      font-weight: 700;
    }
    .unit-ref-delta.up { color: var(--green); }
    .unit-ref-delta.down { color: var(--red); }
    .unit-ref-delta.flat { color: var(--text-3); }
    .psa10-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 20px;
      padding: 0 7px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(245,158,11,0.42);
      background: rgba(245,158,11,0.12);
      color: var(--orange);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
    }
    .listed-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 22px;
      padding: 0 7px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(62,207,142,0.38);
      background: rgba(62,207,142,0.12);
      color: var(--green);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
    }
    .listed-badge-remove {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      color: inherit;
      cursor: pointer;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
      padding: 0;
    }
    .listed-badge-remove:hover {
      background: rgba(255,255,255,0.20);
      color: var(--primary-light);
    }
    .price-note-wrap {
      display: flex;
      justify-content: flex-end;
      margin-top: 3px;
    }
    .price-note-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid rgba(245,158,11,0.45);
      background: rgba(245,158,11,0.12);
      color: var(--orange);
      font-size: 9px;
      font-weight: 700;
      line-height: 1;
      cursor: help;
    }
    .price-note-tooltip {
      position: fixed;
      z-index: 10000;
      max-width: min(320px, calc(100vw - 32px));
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(245,158,11,0.32);
      background: #1f1710;
      color: var(--text);
      box-shadow: 0 12px 30px rgba(0,0,0,0.36);
      font-size: 12px;
      line-height: 1.55;
      text-align: left;
      white-space: normal;
      word-break: break-word;
      pointer-events: none;
    }
    .language-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 24px;
      padding: 0 8px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: var(--text-2);
      font-size: 11px;
      font-weight: 600;
    }
    tbody tr img { transition: all 0.15s ease; cursor: zoom-in; border-radius: var(--radius-sm); }
    tbody tr img:hover { opacity: 0.85; transform: scale(1.05); }

    .mono { font-variant-numeric: tabular-nums; font-family: var(--mono-font); font-size: 13px; }
    .profit-positive { color: var(--green); font-weight: 500; }
    .profit-negative { color: var(--red); font-weight: 500; }
    .profit-zero { color: var(--text-3); }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      letter-spacing: 0.3px;
    }
    .status-unsold { background: #111111; color: var(--text-3); border: 1px solid var(--border); }
    .status-sold { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .status-partial { background: rgba(245,158,11,0.11); color: var(--orange); border: 1px solid var(--orange-border); }
    .status-signed { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }

    .action-btn {
      padding: 8px 12px;
      flex: 0 0 auto;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #111111;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      font-family: 'Manrope', sans-serif;
      transition: all 0.18s ease;
      color: var(--text-2);
    }
    .action-btn:hover { background: rgba(255,255,255,0.02); color: var(--text); border-color: #393939; transform: translateY(-1px); }
    .action-btn.delete:hover { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }

    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-3); }
    .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 20000; padding: 20px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {

(function() {
  var accessSessionKey = 'kajia_access_granted';
  var accessPasswordHash = '1549c7def3809f8916e748ac0b005fb002f912cd03a60bbd7919e40de0576c5f';
  var shell = document.getElementById('auth-fallback');
  var form = document.getElementById('auth-fallback-form');
  var input = document.getElementById('auth-fallback-input');
  var button = document.getElementById('auth-fallback-button');
  var errorBox = document.getElementById('auth-fallback-error');

  function setFallbackError(message) {
    if (!errorBox) return;
    errorBox.textContent = message || '';
    errorBox.style.display = message ? 'block' : 'none';
  }

  async function sha256HexFallback(value) {
    var inputBytes = new TextEncoder().encode(String(value || ''));
    var digest = await crypto.subtle.digest('SHA-256', inputBytes);
    return Array.from(new Uint8Array(digest)).map(function(byte) {
      return byte.toString(16).padStart(2, '0');
    }).join('');
  }

  try {
    if (sessionStorage.getItem(accessSessionKey) === '1' && shell) {
      shell.style.display = 'none';
    }
  } catch (error) {}

  if (!form || !input) return;
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    setFallbackError('');
    if (button) button.disabled = true;
    sha256HexFallback(input.value || '').then(function(digest) {
      if (digest !== accessPasswordHash) {
        input.value = '';
        input.focus();
        setFallbackError('密码不正确，请重试');
        return;
      }
      try {
        sessionStorage.setItem(accessSessionKey, '1');
      } catch (error) {}
      if (shell) shell.style.display = 'none';
      window.location.reload();
    }).catch(function() {
      setFallbackError('密码校验失败，请刷新后重试');
    }).finally(function() {
      if (button) button.disabled = false;
    });
  });
})();

      const width = img.naturalWidth || img.width;
      const height = img.naturalHeight || img.height;
      if (!width || !height) {
        resolve(dataUrl);
        return;
      }

      const scale = Math.min(1, maxDimension / Math.max(width, height));
      const targetWidth = Math.max(1, Math.round(width * scale));
      const targetHeight = Math.max(1, Math.round(height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = targetWidth;
      canvas.height = targetHeight;
      const ctx = canvas.getContext('2d');
      if (!ctx) {
        resolve(dataUrl);
        return;
      }
      ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
      const compressed = canvas.toDataURL('image/jpeg', quality);
      resolve(compressed && compressed.length < dataUrl.length ? compressed : dataUrl);
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });

  if (error) throw error;
  if (!data) return { found: false, payload: [], updatedAt: null };
  return {
    found: true,
    payload: data.payload,
    updatedAt: data.updated_at || null
  };
}
async function fetchItemsFromSupabase(client, config) {

  return {
    found: result.found,
    items: normalizeItems(result.payload),
    updatedAt: result.updatedAt
  };
}
async function savePayloadToSupabase(client, config, payload) {

  const { error } = await client
    .from(config.table)
    .upsert(
      {
        id: config.rowId,

      },

function normalize0754Record(raw, index) {
  if (!raw || typeof raw !== 'object') return null;
  const amount = toNumber(raw.amount, NaN);
  if (!Number.isFinite(amount)) return null;
  const createdAt = String(raw.createdAt || '').trim() || new Date().toISOString();
  const rawDate = String(raw.date || '').trim();
  const fallbackDate = createdAt.slice(0, 10);
  return {
    id: Number.isFinite(raw.id) ? raw.id : (Date.now() + index),
    date: /^\d{4}-\d{2}-\d{2}$/.test(rawDate) ? rawDate : fallbackDate,
    amount: round2(amount),
    createdAt
  };
}
function normalize0754Records(data) {
  if (!Array.isArray(data)) return [];
  return data.map((item, index) => normalize0754Record(item, index)).filter(Boolean);
}
function getFileExtensionFromMimeType(mimeType) {
  if (!mimeType) return 'png';
  if (mimeType.includes('png')) return 'png';
  if (mimeType.includes('jpeg') || mimeType.includes('jpg')) return 'jpg';
  if (mimeType.includes('webp')) return 'webp';
  if (mimeType.includes('gif')) return 'gif';
  return 'png';
}
function slugifyPathPart(value, fallback) {
  const normalized = String(value || fallback || '')
    .trim()
    .replace(/[^a-zA-Z0-9._-]+/g, '-')
    .replace(/^-+|-+$/g, '');
  return normalized || fallback;
}
function buildTcgMikImageUrl(cardCode) {
  if (!cardCode) return null;
  let cleaned = String(cardCode)
    .trim()
    .replace(/[–—_]/g, '-')
    .replace(/\s*\/\d+\s*$/, '')
    .replace(/\s+/g, '');

  let match = cleaned.match(/^(.+)-(\d{1,3})$/);
  if (!match) {
    match = cleaned.match(/^([A-Za-z][A-Za-z0-9.]*)(\d{2,3})$/);
  }
  if (!match) return null;

  const setCode = match[1];
  const cardNum = String(match[2]).padStart(3, '0');
  return `https://tcg.mik.moe/static/img/${setCode}/${cardNum}.png`;
}
function preloadImageUrl(url) {
  return new Promise((resolve, reject) => {
    if (!url) {
      reject(new Error('图片地址为空'));
      return;
    }
    const img = new Image();
    img.onload = () => resolve(url);
    img.onerror = () => reject(new Error('图片不存在或当前站点无法直接访问'));
    img.referrerPolicy = 'no-referrer';
    img.src = url;
  });
}
async function dataUrlToBlob(dataUrl) {
  const response = await fetch(dataUrl);
  return response.blob();
}
async function uploadDataUrlImageToSupabaseStorage(client, config, item, index) {
  const blob = await dataUrlToBlob(item.imageUrl);
  const mimeType = blob.type || 'image/png';
  const extension = getFileExtensionFromMimeType(mimeType);
  const itemKey = slugifyPathPart(item.cardCode || item.id || item.name, `item-${index + 1}`);
  const filePath = `${config.rowId}/${itemKey}-${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${extension}`;

  const { error } = await client.storage
    .from(config.bucket)
    .upload(filePath, blob, {
      contentType: mimeType,
      cacheControl: '31536000',
      upsert: false
    });

  if (error) throw error;

  const { data } = client.storage.from(config.bucket).getPublicUrl(filePath);
  if (!data?.publicUrl) throw new Error('图片上传成功，但未拿到公开地址');
  return data.publicUrl;
}
async function uploadEmbeddedImagesToSupabaseStorage(client, config, items) {
  if (!Array.isArray(items) || items.length === 0) {
    return { items: [], uploadedCount: 0, failedCount: 0, firstError: '' };
  }

  const tasks = items.map(async (item, index) => {
    if (!item || typeof item !== 'object' || !isDataUrlImage(item.imageUrl)) {
      return { item, uploaded: false, failed: false, error: '' };
    }
    try {
      const publicUrl = await uploadDataUrlImageToSupabaseStorage(client, config, item, index);
      return {
        item: {
          ...item,
          imageUrl: publicUrl
        },
        uploaded: true,
        failed: false,
        error: ''
      };
    } catch (error) {
      const fallbackImageUrl = buildTcgMikImageUrl(item.cardCode) || null;
      console.warn('图片上传到 Supabase Storage 失败，改为使用精简图片地址继续同步', error);
      return {
        item: {
          ...item,
          imageUrl: fallbackImageUrl
        },
        uploaded: false,
        failed: true,
        error: error?.message || '图片上传失败'
      };
    }
  });

  const results = await Promise.all(tasks);
  const failedResults = results.filter(result => result.failed);
  return {
    items: results.map(result => result.item),
    uploadedCount: results.filter(result => result.uploaded).length,
    failedCount: failedResults.length,
    firstError: failedResults[0]?.error || ''
  };
}
async function saveItemsToSupabase(client, config, items) {
  const uploaded = await uploadEmbeddedImagesToSupabaseStorage(client, config, items);
  const result = await savePayloadToSupabase(client, config, uploaded.items);
  return {
    updatedAt: result.updatedAt,
    items: uploaded.items,
    uploadedCount: uploaded.uploadedCount,
    failedCount: uploaded.failedCount,
    firstError: uploaded.firstError
  };
}
function formatDateTime(value) {
  if (!value) return '';
  try {
    return new Date(value).toLocaleString('zh-CN', {
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit'
    });
  } catch (error) {
    return '';
  }
}

function normalizeOcrLine(line) {
  return String(line || '')
    .replace(/[：]/g, ':')
    .replace(/[（]/g, '(')
    .replace(/[）]/g, ')')
    .replace(/[—–]/g, '-')
    .replace(/[×✕]/g, 'x')
    .replace(/[￥]/g, '¥')
    .replace(/\s+/g, ' ')
    .trim();
}

function extractCardCodeFromLine(line) {
  if (!line) return '';
  const compact = normalizeOcrLine(line).replace(/\s+/g, '').toUpperCase();
  const match = compact.match(/([A-Z0-9.]+-\d{2,3}(?:\/[A-Z0-9.]+)?)/);
  if (!match) return '';
  return match[1].replace(/\/(\d{2,3})(SR|SAR|AR|CHR|CSR|RRR|RR|UR)$/i, '/$1');
}

function extractPriceFromLine(line) {
  if (!line) return null;
  const normalized = normalizeOcrLine(line).replace(/[,，]/g, '');
  let match = normalized.match(/[¥]\s*([0-9]+(?:\.[0-9]+)?)/);
  if (match) return parseFloat(match[1]);
  if (/^[0-9]+(?:\.[0-9]+)?$/.test(normalized) && normalized.length <= 6) {
    return parseFloat(normalized);
  }
  return null;
}

function extractQtyFromLine(line) {
  if (!line) return null;
  const compact = normalizeOcrLine(line).replace(/\s+/g, '').toLowerCase();
  const match = compact.match(/x(\d{1,3})/);
  if (match) return parseInt(match[1], 10);
  return null;
}

function isIgnoredOcrLine(line) {
  if (!line) return true;
  const normalized = normalizeOcrLine(line);
  if (!normalized) return true;
  if (/^评级卡编号[:：]/.test(normalized)) return true;
  if (/^psa\s*\d+/i.test(normalized)) return true;
  if (/^(流通品相|无标记|查看原图|宝可梦|简|日|英|中)$/i.test(normalized)) return true;
  if (/^(sr|sar|ar|chr|csr|rr|rrr|ur)$/i.test(normalized)) return true;
  return false;
}

function isLikelyNameLine(line) {
  const normalized = normalizeOcrLine(line);
  if (!normalized || isIgnoredOcrLine(normalized)) return false;
  if (extractCardCodeFromLine(normalized)) return false;
  if (extractPriceFromLine(normalized) !== null) return false;
  if (extractQtyFromLine(normalized) !== null) return false;
  return /[\u4e00-\u9fffA-Za-z]/.test(normalized);
}

function cleanupRecognizedName(line) {
  return normalizeOcrLine(line)
    .replace(/\b(?:SR|SAR|AR|CHR|CSR|RRR|RR|UR)\b/gi, '')
    .replace(/[¥]\s*[0-9]+(?:\.[0-9]+)?/g, '')
    .replace(/x\s*\d{1,3}/gi, '')
    .replace(/PSA\s*\d+/gi, '')
    .replace(/\b无标记\b/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function extractNameFromWords(words) {
  const text = (words || [])
    .map(word => String((word && word.text) || '').trim())
    .filter(Boolean)
    .join(' ');
  const cleaned = cleanupRecognizedName(text);
  if (!cleaned) return '';
  return /[\u4e00-\u9fffA-Za-z]/.test(cleaned) ? cleaned : '';
}

function normalizeOcrWord(word) {
  if (!word || typeof word !== 'object') return null;
  const text = normalizeOcrLine(word.text || '');
  if (!text) return null;
  const bbox = word.bbox || {};
  const x0 = Number.isFinite(bbox.x0) ? bbox.x0 : 0;
  const y0 = Number.isFinite(bbox.y0) ? bbox.y0 : 0;
  const x1 = Number.isFinite(bbox.x1) ? bbox.x1 : x0;
  const y1 = Number.isFinite(bbox.y1) ? bbox.y1 : y0;
  return {
    text,
    x0,
    y0,
    x1,
    y1,
    cx: (x0 + x1) / 2,
    cy: (y0 + y1) / 2,
    width: Math.max(1, x1 - x0),
    height: Math.max(1, y1 - y0),
    confidence: Number(word.confidence || 0)
  };
}

function buildLineFromWords(words) {
  const sorted = [...words].sort((a, b) => a.x0 - b.x0);
  return {
    words: sorted,
    text: sorted.map(word => word.text).join(' ').trim(),
    x0: Math.min(...sorted.map(word => word.x0)),
    y0: Math.min(...sorted.map(word => word.y0)),
    x1: Math.max(...sorted.map(word => word.x1)),
    y1: Math.max(...sorted.map(word => word.y1)),
    cx: (Math.min(...sorted.map(word => word.x0)) + Math.max(...sorted.map(word => word.x1))) / 2,
    cy: (Math.min(...sorted.map(word => word.y0)) + Math.max(...sorted.map(word => word.y1))) / 2,
    height: Math.max(...sorted.map(word => word.y1)) - Math.min(...sorted.map(word => word.y0))
  };
}

function groupOcrWordsIntoLines(words) {
  const normalizedWords = (words || [])
    .map(normalizeOcrWord)
    .filter(Boolean)
    .filter(word => word.confidence >= 15 || /[\u4e00-\u9fffA-Za-z0-9¥]/.test(word.text))
    .sort((a, b) => (a.cy - b.cy) || (a.x0 - b.x0));

  const lines = [];
  for (const word of normalizedWords) {
    const lastLine = lines[lines.length - 1];
    const tolerance = Math.max(12, word.height * 0.7);
    if (lastLine && Math.abs(lastLine.cy - word.cy) <= tolerance) {
      lastLine.words.push(word);
      lastLine.y0 = Math.min(lastLine.y0, word.y0);
      lastLine.y1 = Math.max(lastLine.y1, word.y1);
      lastLine.x0 = Math.min(lastLine.x0, word.x0);
      lastLine.x1 = Math.max(lastLine.x1, word.x1);
      lastLine.cy = (lastLine.y0 + lastLine.y1) / 2;
    } else {
      lines.push({
        words: [word],
        x0: word.x0,
        y0: word.y0,
        x1: word.x1,
        y1: word.y1,
        cy: word.cy
      });
    }
  }
  return lines.map(line => buildLineFromWords(line.words));
}

function parseProductsFromOcrWords(words) {
  const normalizedWords = (words || [])
    .map(normalizeOcrWord)
    .filter(Boolean);

  const lines = groupOcrWordsIntoLines(words)
    .map(line => ({ ...line, text: normalizeOcrLine(line.text) }))
    .filter(line => line.text);

  if (!lines.length || !normalizedWords.length) return [];

  const pageWidth = Math.max(...lines.map(line => line.x1), 1);
  const codeLines = lines.filter(line => extractCardCodeFromLine(line.text));
  if (!codeLines.length) return [];

  const products = codeLines.map((codeLine, index) => {
    const prev = codeLines[index - 1];
    const next = codeLines[index + 1];
    const upperBound = prev ? (prev.cy + codeLine.cy) / 2 : 0;
    const lowerBound = next ? (codeLine.cy + next.cy) / 2 : Number.POSITIVE_INFINITY;
    const blockLines = lines.filter(line => line.cy >= upperBound && line.cy < lowerBound);
    const blockWords = normalizedWords.filter(word => word.cy >= upperBound && word.cy < lowerBound);
    const leftWords = blockWords.filter(word => word.x0 < pageWidth * 0.72);
    const rightWords = blockWords.filter(word => word.x0 >= pageWidth * 0.72);
    const rightText = rightWords
      .sort((a, b) => (a.cy - b.cy) || (a.x0 - b.x0))
      .map(word => word.text)
      .join(' ');

    let name = '';
    const nameWords = leftWords
      .filter(word => word.cy <= codeLine.cy - 6)
      .filter(word => !extractPriceFromLine(word.text))
      .filter(word => !extractQtyFromLine(word.text))
      .filter(word => !extractCardCodeFromLine(word.text))
      .filter(word => !isIgnoredOcrLine(word.text))
      .sort((a, b) => a.x0 - b.x0);
    if (nameWords.length > 0) {
      name = extractNameFromWords(nameWords);
    }

    let price = null;
    price = extractPriceFromLine(rightText);
    if (price === null) {
      const priceCandidates = blockLines
        .map(line => extractPriceFromLine(line.text))
        .filter(value => value !== null);
      if (priceCandidates.length > 0) price = priceCandidates[0];
    }

    let qty = null;
    qty = extractQtyFromLine(rightText);
    if (qty === null) {
      const qtyCandidates = blockLines
        .map(line => extractQtyFromLine(line.text))
        .filter(value => value !== null);
      if (qtyCandidates.length > 0) qty = qtyCandidates[qtyCandidates.length - 1];
    }

    if (!name) {
      const fallback = blockLines
        .map(line => extractNameFromWords(line.words))
        .filter(Boolean)
        .map(text => ({ text }))
        .sort((a, b) => a.text.length - b.text.length)[0];
      name = fallback ? fallback.text : '';
    }

    if (!name) {
      const fallbackLine = blockLines
        .filter(line => isLikelyNameLine(line.text))
        .sort((a, b) => a.cy - b.cy)[0];
      name = fallbackLine ? cleanupRecognizedName(fallbackLine.text) : '';
    }

    const cardCode = extractCardCodeFromLine(codeLine.text);
    if (!name || !cardCode) return null;

    const quantity = qty || 1;
    const unitPrice = price === null ? null : price;
    return {
      name,
      cardCode,
      unitPrice,
      qty: quantity,
      cost: unitPrice === null ? 0 : round2(unitPrice * quantity),
      status: '未售出',
      source: '截图识别',
      sells: [],
      profit: null
    };
  }).filter(Boolean);

  const seen = new Set();
  return products.filter(item => {
    const key = [item.name, item.cardCode, item.unitPrice, item.qty].join('|');
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function parseProductsFromScreenshotText(rawText) {
  const lines = String(rawText || '')
    .split(/\n+/)
    .map(normalizeOcrLine)
    .filter(Boolean);

  const codeIndexes = [];
  lines.forEach((line, index) => {
    if (extractCardCodeFromLine(line)) codeIndexes.push(index);
  });

  const products = [];

  function buildProductFromBlock(codeIdx, blockStart, blockEnd) {
    const code = extractCardCodeFromLine(lines[codeIdx]);
    if (!code) return null;

    let name = '';
    for (let i = codeIdx - 1; i >= blockStart; i -= 1) {
      if (isLikelyNameLine(lines[i])) {
        name = cleanupRecognizedName(lines[i]);
        break;
      }
    }

    let price = null;
    let qty = null;
    for (let i = codeIdx; i < blockEnd; i += 1) {
      if (price === null) price = extractPriceFromLine(lines[i]);
      if (qty === null) qty = extractQtyFromLine(lines[i]);
    }

    if (!name) {
      return null;
    }

    const unitPrice = price === null ? null : price;
    const quantity = qty || 1;
    const cost = unitPrice === null ? 0 : round2(unitPrice * quantity);

    return {
      name,
      cardCode: code,
      unitPrice,
      qty: quantity,
      cost,
      status: '未售出',
      source: '截图识别',
      sells: [],
      profit: null
    };
  }

  if (codeIndexes.length > 0) {
    codeIndexes.forEach((codeIdx, position) => {
      const blockStart = position === 0 ? 0 : codeIndexes[position - 1] + 1;
      const blockEnd = position === codeIndexes.length - 1 ? lines.length : codeIndexes[position + 1];
      const product = buildProductFromBlock(codeIdx, blockStart, blockEnd);
      if (product) products.push(product);
    });
  } else {
    lines.forEach((line, index) => {
      const price = extractPriceFromLine(line);
      if (price === null) return;
      let name = '';
      for (let i = index - 1; i >= 0; i -= 1) {
        if (isLikelyNameLine(lines[i])) {
          name = cleanupRecognizedName(lines[i]);
          break;
        }
      }
      if (!name) return;
      const qty = extractQtyFromLine(lines[index + 1] || '') || 1;
      products.push({
        name,
        cardCode: '',
        unitPrice: price,
        qty,
        cost: round2(price * qty),
        status: '未售出',
        source: '截图识别',
        sells: [],
        profit: null
      });
    });
  }

  const seen = new Set();
  return products.filter(item => {
    const key = [item.name, item.cardCode, item.unitPrice, item.qty].join('|');
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

async function enrichRecognizedItemsWithImages(items) {
  const tasks = (items || []).map(async item => {
    if (!item.cardCode) return item;
    try {
      const result = await lookupCardImageViaEdgeFunction(item.cardCode);
      return {
        ...item,
        imageUrl: result.imageUrl || item.imageUrl || null
      };
    } catch (_error) {
      const fallbackUrl = shouldUseTcgMikFallback(item.cardCode) ? buildTcgMikImageUrl(item.cardCode) : null;
      return {
        ...item,
        imageUrl: fallbackUrl || item.imageUrl || null
      };
    }
  });
  return Promise.all(tasks);
}

// Toast notification
function Toast({ message, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 2500);
    return () => clearTimeout(t);
  }, [onDone]);
  return <div className="toast">{message}</div>;
}

function readAccessGranted() {
  if (memoryAccessGranted) return true;
  try {
    return sessionStorage.getItem(ACCESS_SESSION_KEY) === '1';
  } catch (error) {
    return false;
  }
}

function writeAccessGranted(value) {
  memoryAccessGranted = !!value;
  try {
    if (value) {
      sessionStorage.setItem(ACCESS_SESSION_KEY, '1');
    } else {
      sessionStorage.removeItem(ACCESS_SESSION_KEY);
    }
  } catch (error) {}
}

function PasswordGate({ onUnlock }) {
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [checking, setChecking] = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    setChecking(true);
    setError('');
    try {
      const digest = await sha256Hex(password);
      if (digest !== ACCESS_PASSWORD_HASH) {
        throw new Error('密码不正确');
      }
      writeAccessGranted(true);
      onUnlock();
    } catch (err) {
      setError(err?.message || '验证失败');
    } finally {
      setChecking(false);
    }
  }

  return (
    <div className="auth-shell">
      <div className="auth-card">
        <div className="auth-badge">🔒 后台受保护</div>
        <div className="auth-title">输入密码后继续</div>
        <div className="auth-subtitle">
          这个后台现在需要先输入访问密码，验证通过后才会加载卡价管理和 0754 售出数据。
        </div>
        <form onSubmit={handleSubmit}>
          <input
            className="form-input"
            type="password"
            autoFocus
            value={password}
            onChange={e => setPassword(e.target.value)}
            placeholder="请输入访问密码"
            style={{fontSize: 16}}
          />
          <div style={{display:'flex', gap:10, marginTop:14}}>
            <button className="btn btn-primary" type="submit" disabled={!password || checking}>
              {checking ? '验证中...' : '进入后台'}
            </button>
          </div>
        </form>
        {error && <div className="auth-error">{error}</div>}
        <div className="auth-hint">
          当前版本是前端口令保护，适合拦住直接打开页面的访问；如果后面你要更严格的权限控制，我可以继续帮你接真正的账号登录。
        </div>
      </div>
    </div>
  );
}

                placeholder="https://xxxx.supabase.co"
              />
            </div>
            <div className="form-group">
              <label className="form-label">Anon Key</label>
              <textarea
                className="form-input"
                value={config.anonKey}
                onChange={e => onChange('anonKey', e.target.value)}
                placeholder="粘贴 Supabase anon public key"
                style={{minHeight: 110, resize: 'vertical'}}
              />

            <div className="modal-section-title">使用说明</div>
            <div style={{fontSize:13, color:'var(--text-2)', lineHeight:1.7}}>
              <div>1. 在 Supabase 新建项目后，先运行仓库里的 <code>supabase_setup.sql</code>，它会同时创建数据表和图片存储桶。</div>
              <div>2. 到 Project Settings → API，复制 Project URL 和 anon public key。</div>
              <div>3. 保存后，卡价管理、老卡出售记录和 0754 售出都会优先从云端读取数据，上传的本地图片会自动转存到 Supabase Storage。</div>
              <div>4. 如果要用“截图 AI 识别”，还要再部署 <code>card-screenshot-extract-v1</code>，并在 Edge Functions Secrets 里配置 <code>OPENAI_API_KEY</code>。</div>
            </div>

            <div style={{marginTop:16, padding:'12px 14px', borderRadius:10, background:'rgba(240,136,62,0.1)', border:'1px solid rgba(240,136,62,0.25)', color:'#f6b26b', fontSize:12, lineHeight:1.6}}>
              当前方案为了尽快跑通，默认是“持有 anon key 的人都能读写这张表”。个人使用没问题，如果后面要多人或正式长期使用，我们再补登录权限。
            </div>
          </div>
          <div className="modal-footer" style={{justifyContent:'space-between'}}>
            <button className="btn btn-danger" onClick={onDisconnect}>断开云端</button>
            <div style={{display:'flex', gap:10}}>
              <button className="btn btn-secondary" onClick={onClose}>取消</button>
              <button className="btn btn-primary" onClick={onSave} disabled={saving}>{saving ? '连接中...' : '保存并连接'}</button>
            </div>
          </div>
        </div>
      </div>
    </ModalPortal>
  );
}

function JhsListingModal({ item, onSave, onListed, onClose, onToast }) {
  const initialMode = item.jhsListingPriceMode || (item.jhsListingFixedPrice !== undefined && item.jhsListingFixedPrice !== null ? 'fixed' : 'base');
  const [priceMode, setPriceMode] = useState(initialMode);
  const [fixedPrice, setFixedPrice] = useState(item.jhsListingFixedPrice ?? '');
  const [markupPercent, setMarkupPercent] = useState(item.jhsListingMarkupPercent ?? '');
  const [listingNote, setListingNote] = useState(item.jhsListingNote || '');
  const [confirmAdd, setConfirmAdd] = useState(true);
  const [listingBusy, setListingBusy] = useState(false);
  const [listingResult, setListingResult] = useState(null);
  const buildListedItem = (baseItem) => ({
    ...baseItem,
    jhsListed: true,
    jhsListedAt: new Date().toISOString()
  });
  const previewItem = {
    ...item,
    jhsListingPriceMode: priceMode,
    jhsListingFixedPrice: fixedPrice === '' ? null : fixedPrice,
    jhsListingMarkupPercent: markupPercent === '' ? null : markupPercent,
    jhsListingNote: listingNote
  };
  const baseDraft = buildJhsListingDraft(item);
  const previewDraft = buildJhsListingDraft(previewItem);
  const draft = buildJhsListingDraft(item);
  const startListing = async () => {
    const savedItem = handleSave({silent: true});
    if (!savedItem) return;
    if (jhsListingRequiresImage(previewDraft.price) && !hasJhsListingImage(savedItem)) {
      const message = '定价超过 500 元需要上传商品图，请先在商品编辑里添加图片';
      setListingResult({ok:false, error:message});
      onToast?.(message);
      return;
    }
    setListingBusy(true);
    setListingResult(null);
    try {
      const payload = {
        cardCode: draft.cardCode,
        language: draft.language,
        gameLabel: draft.gameLabel,
        isPsa10: !!item.isPsa10,
        price: previewDraft.price,
        qty: draft.qty,
        note: listingNote.trim(),
        imageUrl: item.imageUrl || '',
        confirmAdd
      };
      await assertJhsListingHelperReady();
      const response = await fetch(`${JHS_LISTING_HELPER_BASE_URL}/listings`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      const result = await response.json().catch(() => ({}));
      if (!response.ok || !result.ok) {
        throw new Error(result.error || '本地上架服务调用失败');
      }
      if (result.status === 'listed') {
        onListed?.(buildListedItem(savedItem), result);
        onClose?.();
      } else {
        setListingResult(result);
        onToast?.('已填好上架页，等待你确认添加 ✓');
      }
    } catch (error) {
      const message = getJhsListingServiceErrorMessage(error);
      setListingResult({ok:false, error:message});
      onToast?.(`自动上架失败：${message}`);
    } finally {
      setListingBusy(false);
    }
  };
  const handleSave = (options = {}) => {
    const nextFixedPrice = fixedPrice === '' ? null : normalizeOptionalPrice(fixedPrice);
    const nextMarkupPercent = markupPercent === '' ? null : normalizeOptionalPrice(markupPercent);
    if (priceMode === 'fixed' && nextFixedPrice === null) {
      onToast?.('请填写具体上架价格');
      return false;
    }
    if (priceMode === 'markup' && nextMarkupPercent === null) {
      onToast?.('请填写加价百分比');
      return false;
    }
    const updated = {
      ...item,
      jhsListingPriceMode: priceMode,
      jhsListingFixedPrice: priceMode === 'fixed' ? nextFixedPrice : null,
      jhsListingMarkupPercent: priceMode === 'markup' ? nextMarkupPercent : null,
      jhsListingNote: listingNote.trim()
    };
    onSave(updated, options);
    return updated;
  };
  const markManualListed = () => {
    const savedItem = handleSave({silent: true});
    if (!savedItem) return;
    onListed?.(buildListedItem(savedItem), listingResult || {status: 'listed'});
    onClose?.();
  };

  return (
    <ModalPortal>
      <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
        <div className="modal" style={{maxWidth: 640}}>
          <div className="modal-header">
            <div className="modal-title">上架集换社</div>
            <button className="modal-close" onClick={onClose}>×</button>
          </div>
          <div className="modal-body">
            <div className="modal-section-title">上架信息</div>
            <div className="listing-copy-grid">
              <div className="listing-field">
                <span className="listing-label">商品标题</span>
                <div className="listing-value">{draft.title}</div>
              </div>
              <div className="listing-field">
                <span className="listing-label">集换社搜索</span>
                <div className="listing-value">{draft.cardCode || item.name}</div>
              </div>
              <div className="listing-field">
                <span className="listing-label">价格</span>
                <div className="listing-value">¥{previewDraft.price.toFixed(2)}</div>
              </div>
              <div className="listing-field">
                <span className="listing-label">数量</span>
                <div className="listing-value">{draft.qty}</div>
              </div>
              <div className="listing-field">
                <span className="listing-label">商品类别</span>
                <div className="listing-value">{draft.listingCategory}</div>
              </div>
              <div className="listing-field">
                <span className="listing-label">品相 / 评级</span>
                <div className="listing-value">{draft.condition}</div>
              </div>
              <div className="listing-field">
                <span className="listing-label">语言</span>
                <div className="listing-value">{draft.language || '未标识'}</div>
              </div>
            </div>

            <div className="modal-section-title" style={{marginTop:20}}>上架设置</div>
            <div className="form-group">
              <label className="form-label">上架价格</label>
              <div className="status-options">
                <div className={`status-option ${priceMode === 'base' ? 'selected-sold' : ''}`} onClick={() => setPriceMode('base')}>参考价</div>
                <div className={`status-option ${priceMode === 'fixed' ? 'selected-sold' : ''}`} onClick={() => setPriceMode('fixed')}>具体价格</div>
                <div className={`status-option ${priceMode === 'markup' ? 'selected-sold' : ''}`} onClick={() => setPriceMode('markup')}>加价百分比</div>
              </div>
              <div style={{fontSize:11,color:'var(--text-3)',marginTop:6}}>
                当前参考价 {formatMoney(baseDraft.basePrice)}
              </div>
            </div>
            {priceMode === 'fixed' && (
              <div className="form-group">
                <label className="form-label">具体上架价格 (¥)</label>
                <input className="form-input" type="number" step="0.01" value={fixedPrice} onChange={e => setFixedPrice(e.target.value)} placeholder={baseDraft.basePrice.toFixed(2)} />
              </div>
            )}
            {priceMode === 'markup' && (
              <div className="form-group">
                <label className="form-label">加价百分比 (%)</label>
                <input className="form-input" type="number" step="0.1" value={markupPercent} onChange={e => setMarkupPercent(e.target.value)} placeholder="如：10" />
              </div>
            )}

            <div className="modal-section-title" style={{marginTop:20}}>上架备注</div>
            <textarea className="form-input" value={listingNote} onChange={e => setListingNote(e.target.value)} style={{minHeight: 132, resize: 'vertical', lineHeight: 1.6}} />

            <div className="form-group" style={{marginTop:14}}>
              <label className={`form-check-option ${confirmAdd ? 'active' : ''}`}>
                <input
                  type="checkbox"
                  checked={confirmAdd}
                  onChange={e => setConfirmAdd(e.target.checked)}
                />
                <span>自动点击“添加”完成上架</span>
              </label>
              <div style={{fontSize:11,color:'var(--text-3)',marginTop:6}}>
                关闭时会自动填到添加页并停住，让你检查后手动点击“添加”。
              </div>
            </div>

            <div className="modal-section-title" style={{marginTop:20}}>上架流程</div>
            <div style={{display:'grid',gap:8,fontSize:13,color:'var(--text-2)',lineHeight:1.7}}>
              <div>1. 用编号和语言搜索卡片：{draft.cardCode || item.name} / {draft.language || '未标识'}</div>
              <div>2. 进入卡片详情后点击“出售”。</div>
              <div>3. 商品类别选择“{draft.listingCategory}”，{item.isPsa10 ? '评级类型选择“PSA”。' : '卡牌品相选择“流通品相”。'}</div>
              <div>4. 填入价格 ¥{previewDraft.price.toFixed(2)}、库存 {draft.qty}、备注，并上传商品图。</div>
              <div>5. 点击“添加”完成上架。</div>
            </div>

            <div style={{marginTop:16, padding:'12px 14px', borderRadius:10, background:'rgba(62,207,142,0.08)', border:'1px solid rgba(62,207,142,0.22)', color:'var(--text-2)', fontSize:12, lineHeight:1.7}}>
              需要先启动本地上架服务：<code>python3 scripts/jhs_listing_helper.py</code>。
            </div>
            {listingResult && (
              <div style={{marginTop:12, padding:'12px 14px', borderRadius:10, background: listingResult.ok ? 'rgba(62,207,142,0.08)' : 'rgba(255,107,126,0.10)', border:`1px solid ${listingResult.ok ? 'rgba(62,207,142,0.22)' : 'rgba(255,107,126,0.24)'}`, color: listingResult.ok ? 'var(--text-2)' : 'var(--red)', fontSize:12, lineHeight:1.7}}>
                {listingResult.ok ? (
                  <div>
                    <div style={{fontWeight:800,color:'var(--text)',marginBottom:4}}>{listingResult.status === 'listed' ? '已完成上架' : '已填好上架页'}</div>
                    {(listingResult.steps || []).map((step, index) => <div key={index}>{index + 1}. {step}</div>)}
                    {listingResult.status !== 'listed' && (
                      <button className="btn btn-primary" style={{marginTop:10}} onClick={markManualListed} disabled={listingBusy}>已手动添加，标记已上架</button>
                    )}
                  </div>
                ) : (
                  <div>{listingResult.error || '自动上架失败'}</div>
                )}

          </div>
          <div className="modal-footer" style={{justifyContent:'flex-end', flexWrap:'wrap'}}>
            <button className="btn btn-secondary" onClick={() => handleSave()} disabled={listingBusy}>保存设置</button>
            <button className="btn btn-primary" onClick={startListing} disabled={listingBusy}>{listingBusy ? '上架中...' : '上架'}</button>
          </div>
        </div>
      </div>
    </ModalPortal>

function BulkJhsListingModal({ items, onListed, onClose, onToast }) {
  const [queueItems] = useState(() => items);
  const [priceById, setPriceById] = useState(() => {
    const initial = {};
    items.forEach(item => {
      initial[item.id] = getJhsListingPrice(item).toFixed(2);
    });
    return initial;
  });
  const [confirmAdd, setConfirmAdd] = useState(true);
  const [skipListed, setSkipListed] = useState(true);
  const [busy, setBusy] = useState(false);
  const [currentIndex, setCurrentIndex] = useState(-1);
  const [results, setResults] = useState([]);
  const [bulkError, setBulkError] = useState('');
  const [serviceStatus, setServiceStatus] = useState(null);
  const [serviceBusy, setServiceBusy] = useState(false);
  const eligibleItems = useMemo(() => (
    queueItems.filter(item => !skipListed || !item.jhsListed)
  ), [queueItems, skipListed]);
  const blockedItems = useMemo(() => (
    eligibleItems.filter(item => {
      const price = normalizeOptionalPrice(priceById[item.id]) ?? 0;
      return !buildJhsListingDraft(item).cardCode || price <= 0 || (jhsListingRequiresImage(price) && !hasJhsListingImage(item));
    })
  ), [eligibleItems, priceById]);
  const canStart = eligibleItems.length > 0 && blockedItems.length === 0 && !busy;
  const needsAccessibilityPermission = bulkError.includes('辅助功能权限') || bulkError.includes('辅助功能');
  const updateItemPrice = (id, value) => {
    setPriceById(prev => ({...prev, [id]: value}));
  };
  const helperStatusText = (status) => {
    if (!status) return '';
    if (!status.ok) return status.error || '本地上架服务未启动';
    if (status.accessibilityTrusted === false) return `服务已启动，但辅助功能未授权：${status.executable || ''}`;
    return '服务已启动，辅助功能权限正常';
  };
  const startLocalListingService = async () => {
    setServiceBusy(true);
    setBulkError('');
    try {
      await startJhsListingHelperFromDashboardServer();
      const health = await checkJhsListingHelperReady();
      setServiceStatus(health);
      if (health.accessibilityTrusted === false) {
        setBulkError(`本地上架服务已启动，但辅助功能权限未生效；当前执行程序：${health.executable || '未知'}`);
        onToast?.('服务已启动，但辅助功能权限未生效');
      } else {
        onToast?.('本地上架服务已启动 ✓');
      }
    } catch (error) {
      const message = getJhsListingServiceErrorMessage(error);
      setServiceStatus({ok:false, error:message});
      setBulkError(message);
      onToast?.(`启动服务失败：${message}`);
    } finally {
      setServiceBusy(false);
    }
  };
  const openAccessibilitySettings = async () => {
    try {
      await openAccessibilitySettingsFromDashboardServer();
      onToast?.('已打开辅助功能设置，请勾选 Terminal 或当前 Python 后重试');
    } catch (error) {
      onToast?.(`打开辅助功能设置失败：${getJhsListingServiceErrorMessage(error)}`);
    }
  };

  const runBulkListing = async () => {
    if (!canStart) {
      onToast?.(eligibleItems.length === 0 ? '没有可批量上架的商品' : '有商品缺少编号或价格，不能批量上架');
      return;
    }
    setBusy(true);
    setResults([]);
    setBulkError('');
    setCurrentIndex(0);
    try {
      const health = await assertJhsListingHelperReady();
      setServiceStatus(health);
      if (health.accessibilityTrusted === false) {
        throw new Error(`本地上架服务已启动，但辅助功能权限未生效；当前执行程序：${health.executable || '未知'}`);
      }
      const finalResults = [];
      for (let index = 0; index < eligibleItems.length; index += 1) {
        const item = eligibleItems[index];
        setCurrentIndex(index);
        const payload = buildJhsListingPayload(item, {
          confirmAdd,
          price: normalizeOptionalPrice(priceById[item.id])
        });
        try {
          const response = await fetch(`${JHS_LISTING_HELPER_BASE_URL}/listings`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || !result.ok) {
            throw new Error(result.error || '本地上架服务调用失败');
          }
          const nextResult = {id: item.id, name: item.name, ok: true, status: result.status, steps: result.steps || []};
          finalResults.push(nextResult);
          setResults([...finalResults]);
          if (result.status === 'listed') {
            onListed?.({
              ...item,
              jhsListed: true,
              jhsListedAt: new Date().toISOString()
            }, result);
          } else {
            onToast?.(`已停在「${item.name}」添加页，请手动确认后再继续`);
            break;
          }
        } catch (error) {
          const message = getJhsListingServiceErrorMessage(error);
          finalResults.push({id: item.id, name: item.name, ok: false, error: message});
          setResults([...finalResults]);
          onToast?.(`批量上架停止：${item.name} ${message}`);
          break;
        }
      }
      const listedCount = finalResults.filter(result => result.ok && result.status === 'listed').length;
      if (listedCount > 0) onToast?.(`批量上架完成 ${listedCount}/${eligibleItems.length} ✓`);
    } catch (error) {
      const message = getJhsListingServiceErrorMessage(error);
      setBulkError(message);
      onToast?.(`批量上架启动失败：${message}`);
    } finally {
      setBusy(false);
      setCurrentIndex(-1);
    }
  };

  return (
    <ModalPortal>
      <div className="modal-overlay" onClick={e => !busy && e.target === e.currentTarget && onClose()}>
        <div className="modal" style={{maxWidth: 760}}>
          <div className="modal-header">
            <div className="modal-title">批量上架集换社</div>
            <button className="modal-close" onClick={onClose} disabled={busy}>×</button>
          </div>
          <div className="modal-body">
            <div className="modal-section-title">上架队列</div>
            <div className="listing-copy-grid">
              <div className="listing-field">
                <span className="listing-label">已选商品</span>
                <div className="listing-value">{queueItems.length}</div>
              </div>
              <div className="listing-field">
                <span className="listing-label">本次执行</span>
                <div className="listing-value">{eligibleItems.length}</div>
              </div>
              <div className="listing-field">
                <span className="listing-label">已上架跳过</span>
                <div className="listing-value">{skipListed ? queueItems.length - eligibleItems.length : 0}</div>
              </div>
              <div className="listing-field">
                <span className="listing-label">不能上架</span>
                <div className="listing-value" style={{color: blockedItems.length ? 'var(--red)' : 'var(--green)'}}>{blockedItems.length}</div>
              </div>
            </div>

            <div className="form-group" style={{marginTop:16}}>
              <label className={`form-check-option ${skipListed ? 'active' : ''}`}>
                <input type="checkbox" checked={skipListed} onChange={e => setSkipListed(e.target.checked)} disabled={busy} />
                <span>跳过已有“已上架”标签的商品</span>
              </label>
            </div>
            <div style={{marginTop:14, display:'flex', gap:10, alignItems:'center', flexWrap:'wrap'}}>
              <button className="btn btn-secondary" onClick={startLocalListingService} disabled={busy || serviceBusy}>
                {serviceBusy ? '启动中...' : '启动/检测本地服务'}
              </button>
              {serviceStatus && (
                <span style={{fontSize:12, color: serviceStatus.ok && serviceStatus.accessibilityTrusted !== false ? 'var(--green)' : 'var(--orange)'}}>
                  {helperStatusText(serviceStatus)}
                </span>
              )}
            </div>
            <div className="form-group">
              <label className={`form-check-option ${confirmAdd ? 'active' : ''}`}>
                <input type="checkbox" checked={confirmAdd} onChange={e => setConfirmAdd(e.target.checked)} disabled={busy} />
                <span>自动点击“添加”完成上架</span>
              </label>
              <div style={{fontSize:11,color:'var(--text-3)',marginTop:6}}>
                关闭时会在第一张卡的添加页停住，批量队列不会继续到下一张。
              </div>
            </div>

            {blockedItems.length > 0 && (
              <div style={{marginTop:12, padding:'12px 14px', borderRadius:10, background:'var(--red-bg)', border:'1px solid var(--red-border)', color:'var(--red)', fontSize:12, lineHeight:1.7}}>
                {blockedItems.slice(0, 5).map(item => {
                  const price = normalizeOptionalPrice(priceById[item.id]) ?? 0;
                  const reason = !buildJhsListingDraft(item).cardCode
                    ? '缺少集换社编号'
                    : price <= 0
                      ? '缺少有效上架价格'
                      : '定价超过 500 元，需要先添加商品图';
                  return <div key={item.id}>#{item.id} {item.name} {reason}</div>;
                })}
                {blockedItems.length > 5 && <div>还有 {blockedItems.length - 5} 个商品需要先补资料</div>}
              </div>
            )}
            {bulkError && (
              <div style={{marginTop:12, padding:'12px 14px', borderRadius:10, background:'var(--red-bg)', border:'1px solid var(--red-border)', color:'var(--red)', fontSize:12, lineHeight:1.7}}>
                <div>{bulkError}</div>
                {needsAccessibilityPermission && (
                  <button className="btn btn-secondary" style={{marginTop:10}} onClick={openAccessibilitySettings} disabled={busy}>打开辅助功能设置</button>
                )}
              </div>
            )}

            <div className="modal-section-title" style={{marginTop:18}}>执行状态</div>
            <div style={{display:'grid', gap:8, maxHeight:260, overflow:'auto'}}>
              {eligibleItems.length === 0 ? (
                <div style={{color:'var(--text-3)',fontSize:13}}>没有可执行的商品。</div>
              ) : eligibleItems.map((item, index) => {
                const draft = buildJhsListingDraft(item);
                const result = results.find(entry => entry.id === item.id);
                const isCurrent = busy && index === currentIndex;
                const rowPrice = priceById[item.id] ?? '';
                const parsedPrice = normalizeOptionalPrice(rowPrice);
                const hasInvalidPrice = (parsedPrice ?? 0) <= 0;
                return (

                      {result ? (result.ok ? (result.status === 'listed' ? '已上架' : '待手动') : '失败') : (isCurrent ? '上架中' : '等待')}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          <div className="modal-footer">
            <button className="btn btn-secondary" onClick={onClose} disabled={busy}>关闭</button>
            <button className="btn btn-primary" onClick={runBulkListing} disabled={!canStart}>{busy ? '批量上架中...' : `开始批量上架 ${eligibleItems.length}`}</button>
          </div>
        </div>
      </div>
    </ModalPortal>
  );
}


// 缓存：图片base64前缀 -> 编号（从cardimg文件夹动态匹配，支持png/webp）
let cardCodeCache = null;
let cardCacheReady = false;

async function buildCardCodeCache() {
  if (cardCodeCache) return;
  cardCodeCache = {};
  try {
    // 动态扫描 cardimg 文件夹
    const resp = await fetch('./cardimg/');
    if (!resp.ok) throw new Error('fetch failed');
    const text = await resp.text();
    const matches = text.matchAll(/href="([A-Za-z0-9.]+\.(?:png|webp))"/g);
    const fileNames = [...matches].map(m => m[1]);
    
    // 预加载所有图片的 base64 前缀
    const promises = fileNames.map(async name => {
      try {
        const r = await fetch('./cardimg/' + name);
        if (!r.ok) return;
        const blob = await r.blob();
        const base64 = await new Promise(res => {
          const reader = new FileReader();
          reader.onloadend = () => res(reader.result);
          reader.readAsDataURL(blob);
        });
        const code = name.replace(/\.(png|webp)$/i, '');
        // 存多个长度的前缀以提高匹配精度
        cardCodeCache[base64.slice(0, 80)] = code;
        cardCodeCache[base64.slice(0, 50)] = code;
      } catch {}
    });
    await Promise.all(promises);
    cardCacheReady = true;
  } catch {
    console.warn('cardimg 缓存构建失败，可能未通过服务器访问');
    cardCacheReady = true;
  }
}

async function getCardCodeFromCache(url) {
  if (!url || !url.startsWith('data:')) return '';
  await buildCardCodeCache();
  for (const [key, code] of Object.entries(cardCodeCache)) {
    if (url.startsWith(key)) return code;
  }
  return '';
}

// 从 imageUrl 提取编号：支持URL路径和base64格式
const extractCardCode = (url) => {
  if (!url) return '';
  // 1. 尝试从URL路径提取 (cardimg/CSM2bC-034.png -> CSM2bC-034)
  const match = url.match(/cardimg\/([^/?#]+)\.(?:png|webp|jpg|jpeg)/i);
  if (match) return decodeCardCodeFromFileStem(match[1]);
  return ''; // base64的编号由getCardCodeFromCache异步获取
};

            <div className={`status-option ${form.status === '已售出' ? 'selected-sold' : ''}`} onClick={() => update('status', '已售出')}>已售出</div>
            <div className={`status-option ${form.status === '待签收' ? 'selected-signed' : ''}`} onClick={() => update('status', '待签收')}>待签收</div>
          </div>

          {/* 利润预估 */}
          <div className="profit-summary" style={{marginTop:16}}>
            {form.sells.length > 0 && (
              <>
                <div className="profit-row">
                  <span>已售总价</span><span style={{color:'var(--green)',fontWeight:600}}>¥{totalSell.toFixed(2)}</span>
                </div>
                <div className="profit-row">
                  <span>成本</span><span>¥{cost.toFixed(2)}</span>
                </div>
                <div className="profit-row" style={{borderTop:'1px solid var(--border)',paddingTop:8,marginTop:4}}>
                  <span>预估利润</span>
                  <span style={{color: profit >= 0 ? 'var(--green)' : 'var(--red)', fontWeight:700, fontSize:16}}>
                    {profit !== null ? (profit >= 0 ? '+¥' + profit.toFixed(2) : '-¥' + Math.abs(profit).toFixed(2)) : '—'}
                  </span>
                </div>
              </>
            )}
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>取消</button>
          <button className="btn btn-primary" onClick={handleSave}>保存</button>
        </div>
      </div>
      </div>
    </ModalPortal>
  );
}
