// Batch Image Modal
function BatchImageModal({ items, onUpdate, onClose, showToast }) {
  const [text, setText] = useState('');
  const [loading, setLoading] = useState(false);

  // 根据编号构造图片URL - 支持多种格式
  function buildImageUrl(cardCode) {
    if (!cardCode) return null;
    
    // 清理输入：去掉斜杠后面的总卡数、空白等
    let cleaned = cardCode.trim().replace(/\s*\/\d+\s*$/, '').trim();
    
    let series = '';
    let num = '';
    
    // 格式1: 字母开头系列-数字 (如 CSM2bC-034)
    let match = cleaned.match(/^([A-Za-z][A-Za-z0-9]*)-(\d+)$/);
    if (match) {
      series = match[1];
      num = match[2];
    }
    
    // 格式2: 数字开头系列-数字 (如 151C-189、135C-189)
    if (!series) {
      match = cleaned.match(/^([A-Za-z0-9]*[A-Za-z])-(\d+)$/);
      if (match) {
        series = match[1];
        num = match[2];
      }
    }
    
    // 格式3: 带点号的系列 (如 CS6.5C-054)
    if (!series) {
      match = cleaned.match(/^([A-Za-z][A-Za-z0-9]*\.[A-Za-z0-9]+)-(\d+)$/);
      if (match) {
        series = match[1];
        num = match[2];
      }
    }
    
    // 格式4: 无分隔符 (如 CSM2bC167 -> CSM2bC/167)
    // 规则：系列名以字母结尾，卡号2-3位
    if (!series) {
      match = cleaned.match(/^([A-Za-z][A-Za-z0-9]+)(\d{2,3})$/);
      if (match) {
        series = match[1];
        num = match[2];
        // 如果系列名仍然以数字结尾，进一步调整
        while (series.length > 2 && /[0-9]$/.test(series)) {
          num = series.slice(-1) + num;
          series = series.slice(0, -1);
        }
      }
    }
    
    // 格式5: 纯3位数字 (如 189，无法确定系列)
    if (!series) {
      match = cleaned.match(/^(\d{3})$/);
      if (match) {
        return null; // 需要系列号
      }
    }
    
    if (!series || !num) return null;
    
    // 确保卡号是3位数字
    num = String(num).padStart(3, '0');
    
    return 'https://tcg.mik.moe/static/img/' + series + '/' + num + '.png';
  }

  async function lookupBatchImageUrl(code) {
    try {
      const result = await lookupCardImageViaEdgeFunction(code);
      return result.imageUrl || null;
    } catch (_error) {
      const fallbackUrl = buildImageUrl(code);
      if (!fallbackUrl) return null;
      try {
        await preloadImageUrl(fallbackUrl);
        return fallbackUrl;
      } catch (_fallbackError) {
        return null;
      }
    }
  }

  async function handleApply() {
    const lines = text.trim().split('\n').filter(l => l.trim());
    if (lines.length === 0) {
      showToast('⚠️ 请输入卡牌数据');
      return;
    }

    setLoading(true);
    let updated = 0;
    let skipped = 0;
    const cardMap = {}; // 缓存: 编号 -> 图片 URL

    // 解析输入并校验图片地址
    for (const line of lines) {
      const parts = line.split(/[\t,]/); // 支持 Tab 或逗号分隔
      const name = parts[0]?.trim();
      const code = parts[1]?.trim();
      
      if (!name || !code) continue;

      // 查找匹配的卡牌
      const matchItem = items.find(item => 
        item.name.includes(name) || name.includes(item.name)
      );

      if (!matchItem) {
        skipped++;
        continue;
      }

      if (!cardMap[code]) {
        cardMap[code] = await lookupBatchImageUrl(code);
      }

      if (cardMap[code]) {
        updated++;
      }
    }

    // 更新卡牌数据
    const newItems = items.map(item => {
      for (const line of lines) {
        const parts = line.split(/[\t,]/);
        const name = parts[0]?.trim();
        const code = parts[1]?.trim();
        
        if (code && cardMap[code] && (item.name.includes(name) || name.includes(item.name))) {
          return { ...item, imageUrl: cardMap[code], cardCode: code };
        }
      }
      return item;
    });

    setLoading(false);

    if (updated > 0) {
      onUpdate(newItems);
      showToast(`✅ 成功更新 ${updated} 张卡牌的图片${skipped > 0 ? `（${skipped}条跳过）` : ''}`);
      onClose();
    } else {
      showToast('⚠️ 没有找到匹配的卡牌或图片下载失败');
    }
  }

  return (
    <ModalPortal>
      <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
        <div className="modal" style={{maxWidth:600}}>
          <div className="modal-header">
            <div className="modal-title">🖼️ 批量添加图片</div>
            <button className="modal-close" onClick={onClose}>×</button>
          </div>
          <div className="modal-body">
          <p style={{color:'var(--text-2)', fontSize:13, margin:'0 0 16px', lineHeight:1.7}}>
            每行格式：<code style={{background:'rgba(17,17,17,0.92)',padding:'3px 8px',borderRadius:999,color:'var(--primary)',border:'1px solid rgba(62,207,142,0.24)'}}>卡牌名称	编号</code><br/>
            示例：<code style={{background:'rgba(17,17,17,0.92)',padding:'3px 8px',borderRadius:999,color:'var(--primary)',border:'1px solid rgba(62,207,142,0.24)'}}>超梦tt	CSM2bC-034</code>
          </p>
          <textarea
            value={text}
            onChange={e => setText(e.target.value)}
            placeholder="超梦tt	CSM2bC-034
超梦tt sr	CSM2bC-164
暴击蚊	CSM2bC-158
龙柱v sr	CS6.5C-082"
            style={{
              width:'100%', minHeight:200, background:'rgba(255,255,255,0.94)', border:'1px solid var(--border)',
              borderRadius:20, color:'var(--text)', padding:14, fontSize:13, fontFamily:'var(--mono-font)',
              resize:'vertical', boxSizing:'border-box'
            }}
          />
          <div style={{display:'flex', gap:12, marginTop:16}}>
            <button 
              className="btn btn-primary" 
              style={{flex:1}} 
              onClick={handleApply}
              disabled={loading}
            >
              {loading ? '下载中...' : '下载并应用'}
            </button>
            <button className="btn btn-secondary" style={{flex:1}} onClick={onClose}>取消</button>
          </div>
            <p style={{color:'var(--text-3)', fontSize:12, margin:'12px 0 0', fontWeight:700}}>
              💡 图片从 tcg.mik.moe 自动下载，编号格式如 CSM2bC-034
            </p>
          </div>
        </div>
      </div>
    </ModalPortal>
  );
}

function OldCardInventoryTab({ showToast, supabaseConfig }) {
  const [items, setItems] = useState(() => {
    try {
      const saved = localStorage.getItem(OLD_CARD_STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        const normalized = normalizeItems(parsed);
        if (Array.isArray(parsed)) return normalized;
      }
    } catch (e) {}
    return [];
  });
  const [filter, setFilter] = useState('全部');
  const [search, setSearch] = useState('');
  const [sortField, setSortField] = useState('id');
  const [sortDir, setSortDir] = useState('desc');
  const [editingItem, setEditingItem] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [showScreenshotImport, setShowScreenshotImport] = useState(false);
  const [batchImage, setBatchImage] = useState(false);
  const [page, setPage] = useState(1);
  const itemsRef = useRef(items);
  const remoteReadyRef = useRef(false);
  const skipNextRemoteSaveRef = useRef(false);
  const syncTimerRef = useRef(null);
  const supabaseClientRef = useRef(null);
  const PAGE_SIZE = 20;

  useEffect(() => {
    itemsRef.current = items;
  }, [items]);

  useEffect(() => {
    persistItemsToStorage(items, OLD_CARD_STORAGE_KEY);
  }, [items]);

  useEffect(() => {
    return () => {
      if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
    };
  }, []);

  useEffect(() => {
    setPage(1);
  }, [search, filter, sortField, sortDir]);

  useEffect(() => {
    let cancelled = false;
    if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
    remoteReadyRef.current = false;
    supabaseClientRef.current = null;

    if (!hasSupabaseCredentials(supabaseConfig)) {
      remoteReadyRef.current = true;
      return () => {};
    }

    const scopedConfig = buildScopedSupabaseConfig(supabaseConfig, OLD_CARD_CLOUD_SCOPE);

    async function initSupabaseSync() {
      try {
        const client = createSupabaseBrowserClient(scopedConfig);
        supabaseClientRef.current = client;
        const remoteState = await fetchItemsFromSupabase(client, scopedConfig);
        if (cancelled) return;

        if (remoteState.found) {
          skipNextRemoteSaveRef.current = true;
          setItems(remoteState.items);
        } else {
          const saveResult = await saveItemsToSupabase(client, scopedConfig, itemsRef.current);
          if (cancelled) return;
          if (saveResult.uploadedCount > 0) {
            skipNextRemoteSaveRef.current = true;
            setItems(saveResult.items);
            showToast(`老卡记录有 ${saveResult.uploadedCount} 张图片已上传到云端`);
          }
          if (saveResult.failedCount > 0) {
            showToast(`老卡记录有 ${saveResult.failedCount} 张图片未上传到存储，已先保存在数据库`);
          }
        }
      } catch (error) {
        if (!cancelled) {
          console.error('老卡云端同步初始化失败', error);
          showToast(error?.message ? `老卡云端同步失败：${error.message}` : '老卡云端同步失败');
        }
      } finally {
        if (!cancelled) remoteReadyRef.current = true;
      }
    }

    initSupabaseSync();

    return () => {
      cancelled = true;
      if (syncTimerRef.current) {
        clearTimeout(syncTimerRef.current);
        syncTimerRef.current = null;
        if (remoteReadyRef.current && supabaseClientRef.current) {
          saveItemsToSupabase(supabaseClientRef.current, scopedConfig, itemsRef.current).catch(error => {
            console.error('老卡卸载前云端同步失败', error);
          });
        }
      }
    };
  }, [supabaseConfig, showToast]);

  useEffect(() => {
    if (!hasSupabaseCredentials(supabaseConfig)) return;
    if (!remoteReadyRef.current) return;
    if (!supabaseClientRef.current) return;
    if (skipNextRemoteSaveRef.current) {
      skipNextRemoteSaveRef.current = false;
      return;
    }

    const scopedConfig = buildScopedSupabaseConfig(supabaseConfig, OLD_CARD_CLOUD_SCOPE);
    if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
    syncTimerRef.current = setTimeout(async () => {
      try {
        const saveResult = await saveItemsToSupabase(supabaseClientRef.current, scopedConfig, itemsRef.current);
        if (saveResult.uploadedCount > 0) {
          skipNextRemoteSaveRef.current = true;
          setItems(saveResult.items);
          showToast(`老卡记录有 ${saveResult.uploadedCount} 张图片已上传到云端`);
        }
        if (saveResult.failedCount > 0) {
          showToast(`老卡记录有 ${saveResult.failedCount} 张图片未上传到存储，已先保存在数据库`);
        }
      } catch (error) {
        console.error('老卡云端同步失败', error);
        showToast(error?.message ? `老卡云端同步失败：${error.message}` : '老卡云端同步失败');
      }
    }, 700);

    return () => {
      if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
    };
  }, [items, supabaseConfig, showToast]);

  function persistItemsToStorage(itemsToStore, storageKey) {
    try {
      localStorage.setItem(storageKey, JSON.stringify(itemsToStore));
      return { ok: true, degraded: false };
    } catch (error) {
      const safeItems = makeStorageSafeItems(itemsToStore);
      try {
        localStorage.setItem(storageKey, JSON.stringify(safeItems));
        return { ok: true, degraded: true };
      } catch (fallbackError) {
        console.error('localStorage 持久化失败', fallbackError);
        return { ok: false, degraded: false, error: fallbackError };
      }
    }
  }

  function getSortVal(item, field) {
    if (field === 'remaining') return getItemRemainingQty(item);
    if (field === 'soldValue') return getItemSoldValue(item);
    if (field === 'profit') return getItemSaleProfit(item) ?? -Infinity;
    if (field === 'status') return getItemInventoryStatus(item);
    if (field === 'cardLanguage') return item.cardLanguage || item.jhsGameLabel || '';
    let val = item[field];
    if (val === null || val === undefined) {
      return field === 'profit' ? -Infinity : (typeof items?.[0]?.[field] === 'number' ? -Infinity : '');
    }
    return val;
  }

  const filtered = useMemo(() => {
    let list = items;
    if (filter !== '全部') list = list.filter(i => matchesInventoryFilter(i, filter));
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      list = list.filter(i =>
        String(i.name || '').toLowerCase().includes(q) ||
        String(i.cardLanguage || '').toLowerCase().includes(q) ||
        String(i.jhsGameLabel || '').toLowerCase().includes(q) ||
        languageShortLabel(i.cardLanguage).toLowerCase().includes(q)
      );
    }
    list = [...list].sort((a, b) => {
      const rawA = getSortVal(a, sortField);
      const rawB = getSortVal(b, sortField);
      if (typeof rawA === 'string' && typeof rawB === 'string') {
        const av = rawA.toLowerCase();
        const bv = rawB.toLowerCase();
        if (av < bv) return sortDir === 'asc' ? -1 : 1;
        if (av > bv) return sortDir === 'asc' ? 1 : -1;
        return 0;
      }
      const av = rawA ?? -Infinity;
      const bv = rawB ?? -Infinity;
      if (av < bv) return sortDir === 'asc' ? -1 : 1;
      if (av > bv) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    return list;
  }, [items, filter, search, sortField, sortDir]);

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE) || 1;
  const paginated = filtered.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);

  function handleSort(field) {
    if (sortField === field) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortField(field); setSortDir('asc'); }
  }

  function handleSave(updated) {
    setItems(prev => prev.map(i => i.id === updated.id ? updated : i));
    setEditingItem(null);
    showToast('老卡记录已保存 ✓');
  }

  function handleAdd(newItem) {
    const item = { ...newItem, id: generateId(items) };
    setItems(prev => [item, ...prev]);
    setShowAdd(false);
    showToast('老卡记录已添加 ✓');
  }

  function handleImportRecognized(recognizedItems) {
    setItems(prev => {
      const startId = generateId(prev);
      const nextItems = recognizedItems.map((item, index) => ({
        ...item,
        id: startId + index
      }));
      return [...nextItems.reverse(), ...prev];
    });
    setShowScreenshotImport(false);
    showToast(`已导入 ${recognizedItems.length} 条老卡截图识别记录 ✓`);
  }

  function handleDelete(id) {
    if (!confirm('确定要删除这条老卡记录吗？')) return;
    setItems(prev => prev.filter(i => i.id !== id));
    showToast('老卡记录已删除');
  }

  function handleBulkMarkSigned() {
    setItems(prev => prev.map(i => {
      if (i.status !== '待签收' && getItemSoldValue(i) > 0) {
        return { ...i, status: '待签收' };
      }
      return i;
    }));
    showToast('老卡记录已批量设为待签收 ✓');
  }

  function exportCSV() {
    const headers = ['ID', '名称', '是否PSA10', '语言版本', '单价', '数量', '已售数量', '剩余数量', '成本', '集换社搜索编号', '集换社游戏语言', '流通品价', 'PSA10价', '价格更新时间', '价格备注', '已售总收入', '利润', '状态', '来源'];
    const sortedForExport = [...items].sort((a, b) => a.id - b.id);
    const exportRows = sortedForExport.map(i => {
      const totalSellQty = getItemSoldQty(i);
      const totalSellVal = getItemSoldValue(i);
      const remaining = getItemRemainingQty(i);
      return [i.id, i.name, i.isPsa10 ? '是' : '', i.cardLanguage || i.jhsGameLabel || '', i.unitPrice ?? '', i.qty ?? '', totalSellQty, remaining, i.cost ?? '', i.jhsSearchCode || '', i.jhsGameLabel || '', i.jhsRawPrice ?? '', i.jhsPsa10Price ?? '', i.jhsPriceUpdatedAt || '', i.jhsPriceNote || '', totalSellVal || '', getItemSaleProfit(i) ?? '', getItemInventoryStatus(i), i.source];
    });
    const csv = [headers, ...exportRows.map(r => r.map(v => `"${v}"`).join(','))].join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    saveBlobWithPicker(blob, '老卡出售记录_' + new Date().toISOString().slice(0,10) + '.csv', {
      types: [{ description: 'CSV 文件', accept: { 'text/csv': ['.csv'] } }]
    })
      .then(() => showToast('老卡 CSV 已保存 ✓'))
      .catch(() => showToast('老卡 CSV 保存失败'));
  }

  function saveBackup() {
    const backupPayload = makeBackupSafeItems(items);
    const backup = {
      version: '1.1',
      exportedAt: new Date().toISOString(),
      items: backupPayload.items
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json;charset=utf-8;' });
    saveBlobWithPicker(blob, '老卡出售记录备份_' + new Date().toISOString().slice(0, 10) + '.json', {
      types: [{ description: 'JSON 文件', accept: { 'application/json': ['.json'] } }]
    })
      .then(() => showToast('老卡备份已保存 ✓'))
      .catch(() => showToast('老卡备份保存失败'));
  }

  const totalCards = items.reduce((sum, i) => sum + (i.qty || 1), 0);
  const totalCost = items.reduce((sum, i) => sum + (i.cost || 0), 0);
  const totalSoldValue = round2(items.filter(i => i.status !== '待签收').reduce((sum, i) => sum + getItemSoldValue(i), 0));
  const totalPendingValue = round2(items.filter(i => i.status === '待签收').reduce((sum, i) => sum + getItemSoldValue(i), 0));
  const totalSoldCost = round2(items.filter(i => i.status !== '未售出' || getItemSoldQty(i) > 0).reduce((sum, i) => sum + getItemSoldCost(i), 0));
  const totalEarned = totalSoldValue + totalPendingValue;
  const toBreakEven = totalCost - totalEarned;
  const totalProfit = round2(items.reduce((sum, i) => sum + (getItemSaleProfit(i) || 0), 0));
  const soldCount = items.filter(i => i.status !== '待签收' && getItemSoldQty(i) > 0 && getItemRemainingQty(i) <= 0).length;
  const pendingCount = items.filter(i => i.status === '待签收').length;
  const partialCount = items.filter(i => i.status !== '待签收' && getItemSoldQty(i) > 0 && getItemRemainingQty(i) > 0).length;
  const unsoldCount = items.filter(i => i.status !== '待签收' && getItemRemainingQty(i) > 0).length;

  function SortIcon({ field }) {
    if (sortField !== field) return <span className="sort-icon">⇅</span>;
    return <span className="sort-icon">{sortDir === 'asc' ? '↑' : '↓'}</span>;
  }

  function statusBadgeClass(item) {
    const displayStatus = getItemInventoryStatus(item);
    if (displayStatus === '已售出') return 'status-badge status-sold';
    if (displayStatus === '部分售出') return 'status-badge status-partial';
    if (item.status === '待签收') return 'status-badge status-signed';
    return 'status-badge status-unsold';
  }

  function statusBadgeText(item) {
    const displayStatus = getItemInventoryStatus(item);
    if (displayStatus === '已售出') return '● 已售出';
    if (displayStatus === '部分售出') return '◐ 部分售出';
    if (item.status === '待签收') return '● 待签收';
    return '○ 未售出';
  }

  function rowClass(item) {
    const displayStatus = getItemInventoryStatus(item);
    if (displayStatus === '已售出') return 'status-sold';
    if (displayStatus === '部分售出') return 'status-partial';
    if (item.status === '待签收') return 'status-signed';
    return '';
  }

  return (
    <>
      <div className="stats-bar">
        <div className="stat-card blue">
          <div className="stat-label">库存成本</div>
          <div className="stat-value">{formatMoney(totalCost)}</div>
          <div className="stat-sub">{unsoldCount} 种在库{partialCount > 0 ? `，${partialCount} 种部分售出` : ''}</div>
          <div className="stat-detail">
            <div className="stat-detail-label">{toBreakEven > 0 ? '距回本还差' : '已超额回本'}</div>
            <div style={{fontSize:18,fontWeight:700,color:toBreakEven > 0 ? 'var(--orange)' : 'var(--green)'}}>{toBreakEven > 0 ? formatMoney(toBreakEven) : formatMoney(-toBreakEven)}</div>
            <div className="stat-detail-note">已收 {formatMoney(totalEarned)}</div>
          </div>
        </div>
        <div className="stat-card green">
          <div className="stat-label">已售总额</div>
          <div className="stat-value green">{formatMoney(totalSoldValue)}</div>
          <div className="stat-sub">{soldCount} 种全量售出{partialCount > 0 ? `，另 ${partialCount} 种部分售出` : ''}</div>
          <div className="stat-detail">
            <div className="stat-detail-label">当前利润</div>
            <div style={{fontSize:18,fontWeight:700,color:totalProfit >= 0 ? 'var(--green)' : 'var(--red)'}}>{totalProfit >= 0 ? '+' : ''}{formatMoney(totalProfit)}</div>
            <div className="stat-detail-note">利润率 {totalSoldValue > 0 ? ((totalProfit / (totalSoldCost || 1)) * 100).toFixed(1) : 0}%</div>
          </div>
        </div>
        <div className="stat-card primary">
          <div className="stat-label">总卡牌数</div>
          <div className="stat-value">{items.length}</div>
          <div className="stat-sub">{totalCards} 张卡牌</div>
        </div>
        <div className="stat-card blue">
          <div className="stat-label">已售成本</div>
          <div className="stat-value">{formatMoney(totalSoldCost)}</div>
          <div className="stat-sub">已售+待签收</div>
        </div>
        <div className="stat-card red">
          <div className="stat-label">待签收金额</div>
          <div className="stat-value" style={{color:'var(--red)'}}>{formatMoney(totalPendingValue)}</div>
          <div className="stat-sub">{pendingCount} 种待签收</div>
        </div>
      </div>

      <div className="table-sticky-wrapper">
        <div className="toolbar">
          <div className="search-box">
            <svg className="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
            <input placeholder="搜索老卡名称..." value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          <div className="filter-group">
            <button className={`filter-btn ${filter === '全部' ? 'active' : ''}`} onClick={() => setFilter('全部')}>全部</button>
            <button className={`filter-btn ${filter === '未售出' ? 'active' : ''}`} onClick={() => setFilter('未售出')}>未售出</button>
            <button className={`filter-btn ${filter === '已售出' ? 'active-green' : ''}`} onClick={() => setFilter('已售出')}>已售出</button>
            <button className={`filter-btn ${filter === '待签收' ? 'active-orange' : ''}`} onClick={() => setFilter('待签收')}>待签收</button>
          </div>
          <div className="bulk-actions">
            <select value={sortField + '|' + sortDir} onChange={e => {
              const [f, d] = e.target.value.split('|');
              setSortField(f);
              setSortDir(d);
            }} className="toolbar-select">
              <option value="id|desc">⇅ 默认（最新在前）</option>
              <option value="id|asc">⇅ ID 升序</option>
              <option value="name|asc">⇅ 名称 A→Z</option>
              <option value="name|desc">⇅ 名称 Z→A</option>
              <option value="unitPrice|desc">⇅ 单价 高→低</option>
              <option value="unitPrice|asc">⇅ 单价 低→高</option>
              <option value="qty|desc">⇅ 数量 多→少</option>
              <option value="cost|desc">⇅ 成本 高→低</option>
              <option value="cost|asc">⇅ 成本 低→高</option>
              <option value="remaining|desc">⇅ 剩余 多→少</option>
              <option value="remaining|asc">⇅ 剩余 少→多</option>
              <option value="soldValue|desc">⇅ 已售额 高→低</option>
              <option value="soldValue|asc">⇅ 已售额 低→高</option>
              <option value="profit|desc">⇅ 利润 高→低</option>
              <option value="profit|asc">⇅ 利润 低→高</option>
            </select>
            <button className="btn btn-secondary" onClick={handleBulkMarkSigned}>批量设为待签收</button>
            <button className="btn btn-secondary" onClick={saveBackup}>💾 保存备份</button>
            <button className="btn btn-secondary" onClick={() => document.getElementById('oldCardImportInput').click()}>📂 导入备份</button>
            <input id="oldCardImportInput" type="file" accept=".json" style={{display:'none'}} onChange={e => {
              const file = e.target.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = ev => {
                try {
                  const data = JSON.parse(ev.target.result);
                  const importedItems = Array.isArray(data) ? data : (data.items || []);
                  const normalizedItems = normalizeItems(importedItems);
                  if (normalizedItems.length === 0) { showToast('老卡文件格式错误或无可导入数据'); return; }
                  if (!confirm(`将导入 ${normalizedItems.length} 条老卡数据，当前老卡数据将被覆盖，确定吗？`)) return;
                  setItems(normalizedItems);
                  showToast('老卡数据导入成功 ✓');
                } catch {
                  showToast('老卡文件解析失败');
                }
              };
              reader.readAsText(file);
              e.target.value = '';
            }} />
            <button className="btn btn-secondary" onClick={exportCSV}>📥 导出 CSV</button>
          </div>
        </div>

        {showAdd && <AddCardForm onAdd={handleAdd} onCancel={() => setShowAdd(false)} />}
        {!showAdd && (
          <div className="add-form-toggle" style={{display:'flex', gap:12, flexWrap:'wrap'}}>
            <button className="btn btn-primary" onClick={() => setShowAdd(true)}>+ 添加老卡记录</button>
            <button className="btn btn-gold-soft" onClick={() => setShowScreenshotImport(true)}>🧠 截图识别新增</button>
            <button className="btn btn-green-soft" onClick={() => setBatchImage(true)}>🖼️ 批量添加图片</button>
          </div>
        )}
        {showScreenshotImport && <ScreenshotImportModal onImport={handleImportRecognized} onClose={() => setShowScreenshotImport(false)} showToast={showToast} />}
        {batchImage && <BatchImageModal items={items} onUpdate={setItems} onClose={() => setBatchImage(false)} showToast={showToast} />}

        <div className="table-container">
          <div className="table-wrap">
            <div className="table-scroll">
            <table className="old-card-table">
              <thead>
                <tr>
                  <th style={{width: 60, textAlign:'center'}} onClick={() => handleSort('id')} className={sortField === 'id' ? 'sorted' : ''}>ID <SortIcon field="id"/></th>
                  <th style={{width: 56, textAlign:'center'}}>图</th>
                  <th onClick={() => handleSort('name')} className={sortField === 'name' ? 'sorted' : ''}>卡牌名称 <SortIcon field="name"/></th>
                  <th onClick={() => handleSort('unitPrice')} className={sortField === 'unitPrice' ? 'sorted' : ''} style={{textAlign:'right'}}>单价 <SortIcon field="unitPrice"/></th>
                  <th onClick={() => handleSort('qty')} className={sortField === 'qty' ? 'sorted' : ''} style={{textAlign:'right'}}>数量 <SortIcon field="qty"/></th>
                  <th onClick={() => handleSort('remaining')} className={sortField === 'remaining' ? 'sorted' : ''} style={{textAlign:'right'}}>剩余 <SortIcon field="remaining"/></th>
                  <th onClick={() => handleSort('cost')} className={sortField === 'cost' ? 'sorted' : ''} style={{textAlign:'right'}}>成本 <SortIcon field="cost"/></th>
                  <th onClick={() => handleSort('soldValue')} className={sortField === 'soldValue' ? 'sorted' : ''} style={{textAlign:'right', fontSize: 11}}>已售 <SortIcon field="soldValue"/></th>
                  <th onClick={() => handleSort('profit')} className={sortField === 'profit' ? 'sorted' : ''} style={{textAlign:'right'}}>利润 <SortIcon field="profit"/></th>
                  <th onClick={() => handleSort('status')} className={sortField === 'status' ? 'sorted' : ''} style={{width:100}}>状态 <SortIcon field="status"/></th>
                  <th className="action-col" style={{width: 132}}>操作</th>
                </tr>
              </thead>
              <tbody>
                {paginated.length === 0 ? (
                  <tr><td colSpan={11}><div className="empty-state"><div className="empty-icon">🗂️</div>老卡出售记录还是空的，先导入数据或手动新增一条吧</div></td></tr>
                ) : paginated.map(item => (
                  <tr key={item.id} className={rowClass(item)}>
                    <td style={{color: 'var(--text-3)', fontSize: 12, textAlign:'center'}}>{item.id}</td>
                    <td>
                      {item.imageUrl ? (
                        <img
                          src={item.imageUrl}
                          alt={item.name}
                          style={{width:40,height:40,objectFit:'contain',borderRadius:10,border:'1px solid var(--border)',background:'#111111',flexShrink:0}}
                          onError={e => { e.target.style.display='none'; }}
                        />
                      ) : (
                        <div style={{width:40,height:40,borderRadius:10,border:'1px dashed var(--border)',background:'#111111',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>🃏</div>
                      )}
                    </td>
                    <td className="card-name">
                      <span className="card-name-line">
                        <span>{item.name}</span>
                        {item.isPsa10 && <span className="psa10-badge">PSA10</span>}
                      </span>
                    </td>
                    <td className="price-cell" style={{textAlign:'right'}}>
                      {item.unitPrice !== null ? '¥' + item.unitPrice.toLocaleString('zh-CN', {minimumFractionDigits:2}) : '—'}
                      {renderUnitReferenceDelta(item)}
                    </td>
                    <td className="price-cell" style={{textAlign:'right'}}>{item.qty ?? '—'}</td>
                    <td className="price-cell" style={{textAlign:'right', color: 'var(--text-3)'}}>{getItemRemainingQty(item)}</td>
                    <td className="price-cell" style={{textAlign:'right'}}>{item.cost !== null ? formatMoney(item.cost) : '—'}</td>
                    <td className="price-cell" style={{textAlign:'right', color: 'var(--green)', fontWeight:600}}>
                      {getItemSoldQty(item) > 0
                        ? (() => {
                            const totalQty = getItemSoldQty(item);
                            const totalVal = getItemSoldValue(item);
                            return `${totalQty}张 ¥${totalVal.toFixed(2)}`;
                          })()
                        : '—'}
                    </td>
                    <td className="price-cell" style={{textAlign:'right'}}>
                      {getItemSaleProfit(item) !== null ? (
                        <span className={getItemSaleProfit(item) > 0 ? 'profit-positive' : getItemSaleProfit(item) < 0 ? 'profit-negative' : 'profit-zero'}>
                          {getItemSaleProfit(item) > 0 ? '+' : ''}{formatMoney(getItemSaleProfit(item))}
                        </span>
                      ) : '—'}
                    </td>
                    <td><span className={statusBadgeClass(item)}>{statusBadgeText(item)}</span></td>
                    <td className="action-col">
                      <div className="row-actions">
                        <button className="action-btn" onClick={() => setEditingItem(item)}>编辑</button>
                        <button className="action-btn" style={{color:'var(--red)', borderColor:'var(--red-border)', background:'var(--red-bg)'}} onClick={() => handleDelete(item.id)}>删除</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            </div>

            {totalPages > 1 && (
              <div style={{padding:'16px', display:'flex', justifyContent:'space-between', alignItems:'center', borderTop:'1px solid var(--border)'}}>
                <div style={{fontSize:13, color:'var(--text-2)'}}>
                  显示 {(page-1)*PAGE_SIZE + 1}–{Math.min(page*PAGE_SIZE, filtered.length)}，共 {filtered.length} 条
                </div>
                <div style={{display:'flex', gap:4}}>
                  <button className="btn btn-secondary" disabled={page === 1} onClick={() => setPage(p => p - 1)}>‹ 上一页</button>
                  {Array.from({length: Math.min(5, totalPages)}, (_, i) => {
                    let p = i + 1;
                    if (totalPages > 5) {
                      if (page > 3) p = page - 2 + i;
                      if (page > totalPages - 2) p = totalPages - 4 + i;
                    }
                    if (p < 1 || p > totalPages) return null;
                    return <button key={p} className={`btn ${page === p ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setPage(p)} style={{minWidth:40}}>{p}</button>;
                  })}
                  <button className="btn btn-secondary" disabled={page === totalPages} onClick={() => setPage(p => p + 1)}>下一页 ›</button>
                </div>
              </div>
            )}
          </div>

          <div style={{textAlign:'center', fontSize:12, color:'var(--text-2)', marginTop:12}}>
            <div className="color-legend" style={{justifyContent:'center'}}>
              <div className="color-legend-item"><div className="color-dot gray"></div>未售出</div>
              <div className="color-legend-item"><div className="color-dot green"></div>已售出</div>
              <div className="color-legend-item"><div className="color-dot orange"></div>待签收</div>
            </div>
          </div>
        </div>
      </div>

      {editingItem && <EditModal item={editingItem} onSave={handleSave} onClose={() => setEditingItem(null)} onToast={showToast} />}
    </>
  );
}

// Main App
function App({ onLock }) {
  const [zoomedImage, setZoomedImage] = useState(null);
  const [activeTab, setActiveTab] = useState('main');
  const [supabaseConfig, setSupabaseConfig] = useState(() => readSupabaseConfig());
  const [items, setItems] = useState(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        const normalized = normalizeItems(parsed);
        if (Array.isArray(parsed)) return normalized;
      }
    } catch (e) {}
    return INITIAL_DATA;
  });
  
  // Merge imageUrl from INITIAL_DATA to localStorage data
  useEffect(() => {
    setItems(prev => {
      const initialMap = {};
      INITIAL_DATA.forEach(i => { if (i.imageUrl) initialMap[i.id] = i.imageUrl; });
      let changed = false;
      const merged = prev.map(item => {
        if (initialMap[item.id] && !item.imageUrl) {
          changed = true;
          return { ...item, imageUrl: initialMap[item.id] };
        }
        return item;
      });
      return changed ? merged : prev;
    });
  }, []);
  const [filter, setFilter] = useState('全部');
  const [search, setSearch] = useState('');
  const [sortField, setSortField] = useState('id');
  const [sortDir, setSortDir] = useState('desc');
  const [editingItem, setEditingItem] = useState(null);
  const [listingItem, setListingItem] = useState(null);
  const [bulkListingOpen, setBulkListingOpen] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [showScreenshotImport, setShowScreenshotImport] = useState(false);
  const [batchImage, setBatchImage] = useState(false);
  const [selectedIds, setSelectedIds] = useState([]);
  const [bulkLanguage, setBulkLanguage] = useState('');
  const [toast, setToast] = useState(null);
  const [priceNoteTooltip, setPriceNoteTooltip] = useState(null);
  const [page, setPage] = useState(1);
  const [showCloudConfig, setShowCloudConfig] = useState(false);
  const [cloudForm, setCloudForm] = useState(() => readSupabaseConfig());
  const [cloudStatus, setCloudStatus] = useState(() => hasSupabaseCredentials(readSupabaseConfig()) ? '待连接' : '未配置');
  const [cloudError, setCloudError] = useState('');
  const [lastCloudSyncAt, setLastCloudSyncAt] = useState(null);
  const [cloudBusy, setCloudBusy] = useState(false);
  const storageWarningShownRef = useRef(false);
  const itemsRef = useRef(items);
  const remoteReadyRef = useRef(false);
  const skipNextRemoteSaveRef = useRef(false);
  const syncTimerRef = useRef(null);
  const supabaseClientRef = useRef(null);
  const PAGE_SIZE = 20;

  useEffect(() => {
    itemsRef.current = items;
  }, [items]);

  useEffect(() => {
    setSelectedIds(prev => {
      const existingIds = new Set(items.map(item => item.id));
      const next = prev.filter(id => existingIds.has(id));
      return next.length === prev.length ? prev : next;
    });
  }, [items]);

  useEffect(() => {
    return () => {
      if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
    };
  }, []);

  useEffect(() => {
    let cancelled = false;
    if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
    remoteReadyRef.current = false;
    supabaseClientRef.current = null;
    setCloudError('');
    setLastCloudSyncAt(null);

    if (!hasSupabaseCredentials(supabaseConfig)) {
      setCloudStatus('未配置');
      remoteReadyRef.current = true;
      return () => {};
    }

    async function initSupabaseSync() {
      setCloudBusy(true);
      setCloudStatus('连接中');
      try {
        const client = createSupabaseBrowserClient(supabaseConfig);
        supabaseClientRef.current = client;
        const remoteState = await fetchItemsFromSupabase(client, supabaseConfig);
        if (cancelled) return;

        if (remoteState.found) {
          skipNextRemoteSaveRef.current = true;
          setItems(remoteState.items);
          setLastCloudSyncAt(remoteState.updatedAt);
        } else {
          const saveResult = await saveItemsToSupabase(client, supabaseConfig, itemsRef.current);
          if (cancelled) return;
          if (saveResult.uploadedCount > 0) {
            skipNextRemoteSaveRef.current = true;
            setItems(saveResult.items);
            showToast(`已上传 ${saveResult.uploadedCount} 张图片到云端`);
          }
          if (saveResult.failedCount > 0) {
            showToast(`有 ${saveResult.failedCount} 张图片未上传到存储，已先保存在数据库`);
          }
          setLastCloudSyncAt(saveResult.updatedAt);
        }

        setCloudStatus('已连接');
      } catch (error) {
        if (cancelled) return;
        setCloudStatus('连接失败');
        setCloudError(error?.message || 'Supabase 连接失败');
      } finally {
        if (!cancelled) {
          remoteReadyRef.current = true;
          setCloudBusy(false);
        }
      }
    }

    initSupabaseSync();

    return () => {
      cancelled = true;
    };
  }, [supabaseConfig]);

  // Persist to localStorage
  useEffect(() => {
    const result = persistItemsToStorage(items);
    if (result.degraded && !storageWarningShownRef.current) {
      storageWarningShownRef.current = true;
      showToast('图片过大，已自动精简本地缓存以避免黑屏');
    }
  }, [items]);

  // Persist to Supabase
  useEffect(() => {
    if (!hasSupabaseCredentials(supabaseConfig)) return;
    if (!remoteReadyRef.current) return;
    if (!supabaseClientRef.current) return;
    if (skipNextRemoteSaveRef.current) {
      skipNextRemoteSaveRef.current = false;
      return;
    }

    if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
    syncTimerRef.current = setTimeout(async () => {
      setCloudBusy(true);
      setCloudStatus('同步中');
      setCloudError('');
      try {
        const saveResult = await saveItemsToSupabase(supabaseClientRef.current, supabaseConfig, itemsRef.current);
        if (saveResult.uploadedCount > 0) {
          skipNextRemoteSaveRef.current = true;
          setItems(saveResult.items);
          showToast(`已上传 ${saveResult.uploadedCount} 张图片到云端`);
        }
        if (saveResult.failedCount > 0) {
          showToast(`有 ${saveResult.failedCount} 张图片未上传到存储，已先保存在数据库`);
        }
        setLastCloudSyncAt(saveResult.updatedAt);
        setCloudStatus('已连接');
      } catch (error) {
        setCloudStatus('同步失败');
        setCloudError(error?.message || '云端同步失败');
      } finally {
        setCloudBusy(false);
      }
    }, 700);

    return () => {
      if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
    };
  }, [items, supabaseConfig]);

  const showToast = useCallback((msg) => {
    setToast(msg);
  }, []);

  const showPriceNoteTooltip = (event, text) => {
    if (!text) return;
    const rect = event.currentTarget.getBoundingClientRect();
    const x = Math.min(window.innerWidth - 16, Math.max(16, rect.right));
    const y = Math.max(16, rect.top - 8);
    setPriceNoteTooltip({ text, x, y });
  };

  const hidePriceNoteTooltip = () => {
    setPriceNoteTooltip(null);
  };

  function handleCloudFormChange(field, value) {
    setCloudForm(prev => ({ ...prev, [field]: value }));
  }

  function handleCloudSave() {
    const nextConfig = normalizeSupabaseConfig(cloudForm);
    if (!nextConfig.url || !nextConfig.anonKey) {
      showToast('请先填写 Supabase URL 和 anon key');
      return;
    }
    const savedConfig = saveSupabaseConfig(nextConfig);
    setSupabaseConfig(savedConfig);
    setCloudForm(savedConfig);
    setShowCloudConfig(false);
    showToast('已保存 Supabase 配置');
  }

  function handleCloudDisconnect() {
    clearSupabaseConfig();
    if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
    supabaseClientRef.current = null;
    remoteReadyRef.current = true;
    const resetConfig = { ...SUPABASE_DEFAULT_CONFIG };
    setSupabaseConfig(resetConfig);
    setCloudForm(resetConfig);
    setCloudStatus('未配置');
    setCloudError('');
    setLastCloudSyncAt(null);
    setShowCloudConfig(false);
    showToast('已切换回本地模式');
  }

  const cloudStatusColor = cloudStatus === '已连接'
    ? 'var(--green)'
    : (cloudStatus === '同步失败' || cloudStatus === '连接失败'
      ? 'var(--red)'
      : (cloudStatus === '同步中' || cloudStatus === '连接中' ? 'var(--orange)' : 'var(--text-3)'));

  // Helper: get sortable value from item (supports computed fields)
  const getSortVal = useCallback((item, field) => {
    if (field === 'remaining') return getItemRemainingQty(item);
    if (field === 'soldValue') return getItemSoldValue(item);
    if (field === 'profit') return getItemSaleProfit(item) ?? -Infinity;
    if (field === 'status') return getItemInventoryStatus(item);
    if (field === 'cardLanguage') return item.cardLanguage || item.jhsGameLabel || '';
    if (field === 'jhsRawPrice') return priceChangeSortValue(item, 'raw');
    if (field === 'jhsPsa10Price') return priceChangeSortValue(item, 'psa10');
    let val = item[field];
    if (val === null || val === undefined) { return field === 'profit' ? -Infinity : (typeof items?.[0]?.[field] === 'number' ? -Infinity : ''); }
    return val;
  }, [items]);

  // Filter + sort
  const filtered = useMemo(() => {
    let list = items;
    if (filter !== '全部') list = list.filter(i => matchesInventoryFilter(i, filter));
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      list = list.filter(i =>
        String(i.name || '').toLowerCase().includes(q) ||
        String(i.cardLanguage || '').toLowerCase().includes(q) ||
        String(i.jhsGameLabel || '').toLowerCase().includes(q) ||
        languageShortLabel(i.cardLanguage).toLowerCase().includes(q)
      );
    }
    // Sort — supports both direct fields and computed fields
    list = [...list].sort((a, b) => {
      const rawA = getSortVal(a, sortField);
      const rawB = getSortVal(b, sortField);
      if (sortField === 'jhsRawPrice' || sortField === 'jhsPsa10Price') {
        const missingA = rawA === null || rawA === undefined || rawA === '';
        const missingB = rawB === null || rawB === undefined || rawB === '';
        if (missingA && missingB) return 0;
        if (missingA) return 1;
        if (missingB) return -1;
      }
      // Handle string comparison
      if (typeof rawA === 'string' && typeof rawB === 'string') {
        const av = rawA.toLowerCase(), bv = rawB.toLowerCase();
        if (av < bv) return sortDir === 'asc' ? -1 : 1;
        if (av > bv) return sortDir === 'asc' ? 1 : -1;
        return 0;
      }
      // Numeric comparison (nulls last)
      const av = rawA ?? -Infinity;
      const bv = rawB ?? -Infinity;
      if (av < bv) return sortDir === 'asc' ? -1 : 1;
      if (av > bv) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    return list;
  }, [items, filter, search, sortField, sortDir, getSortVal]);

  // Pagination
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const paginated = filtered.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);
  const selectedIdSet = useMemo(() => new Set(selectedIds), [selectedIds]);
  const pageIds = paginated.map(item => item.id);
  const isPageSelected = pageIds.length > 0 && pageIds.every(id => selectedIdSet.has(id));
  const selectedItems = useMemo(() => (
    selectedIds.map(id => items.find(item => item.id === id)).filter(Boolean)
  ), [items, selectedIds]);

  function handleSort(field) {
    if (sortField === field) { setSortDir(d => d === 'asc' ? 'desc' : 'asc'); }
    else { setSortField(field); setSortDir('asc'); }
    setPage(1);
  }

  function handleSave(updated) {
    setItems(prev => prev.map(i => i.id === updated.id ? updated : i));
    setEditingItem(null);
    showToast('保存成功 ✓');
  }

  function handleListingSave(updated, options = {}) {
    setItems(prev => prev.map(i => i.id === updated.id ? updated : i));
    setListingItem(updated);
    if (!options.silent) showToast('上架设置已保存 ✓');
  }

  function handleListingDone(updated) {
    setItems(prev => prev.map(i => i.id === updated.id ? updated : i));
    setListingItem(null);
    showToast('上架完成 ✓');
  }

  function handleBulkListingDone(updated) {
    setItems(prev => prev.map(i => i.id === updated.id ? updated : i));
  }

  function clearListedTag(id) {
    setItems(prev => prev.map(i => i.id === id ? {
      ...i,
      jhsListed: false,
      jhsListedAt: ''
    } : i));
    showToast('已取消上架标签');
  }

  function handleAdd(newItem) {
    const item = { ...newItem, id: generateId(items) };
    setItems(prev => [item, ...prev]);
    setShowAdd(false);
    showToast('添加成功 ✓');
  }

  function handleImportRecognized(recognizedItems) {
    setItems(prev => {
      const startId = generateId(prev);
      const nextItems = recognizedItems.map((item, index) => ({
        ...item,
        id: startId + index
      }));
      return [...nextItems.reverse(), ...prev];
    });
    setShowScreenshotImport(false);
    showToast(`已导入 ${recognizedItems.length} 条截图识别记录 ✓`);
  }

  function handleDelete(id) {
    if (!confirm('确定要删除这条记录吗？')) return;
    setItems(prev => prev.filter(i => i.id !== id));
    setSelectedIds(prev => prev.filter(selectedId => selectedId !== id));
    showToast('已删除');
  }

  function toggleSelectItem(id, checked) {
    setSelectedIds(prev => {
      if (checked) return prev.includes(id) ? prev : [...prev, id];
      return prev.filter(selectedId => selectedId !== id);
    });
  }

  function toggleSelectPage(checked) {
    setSelectedIds(prev => {
      if (checked) {
        const next = new Set(prev);
        pageIds.forEach(id => next.add(id));
        return Array.from(next);
      }
      const pageIdSet = new Set(pageIds);
      return prev.filter(id => !pageIdSet.has(id));
    });
  }

  function handleBulkLanguageUpdate(scope) {
    const language = normalizeCardLanguage(bulkLanguage);
    if (!language) {
      showToast('请先选择语言标识');
      return;
    }
    const targetIds = scope === 'filtered' ? filtered.map(item => item.id) : selectedIds;
    if (targetIds.length === 0) {
      showToast(scope === 'filtered' ? '当前筛选结果为空' : '请先勾选要打标的商品');
      return;
    }
    const targetIdSet = new Set(targetIds);
    setItems(prev => prev.map(item => targetIdSet.has(item.id) ? {
      ...item,
      cardLanguage: language,
      jhsGameLabel: language
    } : item));
    showToast(`已给 ${targetIds.length} 个商品标识为 ${languageShortLabel(language)} ✓`);
  }

  function handleBulkMarkSigned() {
    setItems(prev => prev.map(i => {
      if (i.status !== '待签收' && getItemSoldValue(i) > 0) {
        return { ...i, status: '待签收' };
      }
      return i;
    }));
    showToast('批量更新为待签收 ✓');
  }

  function exportCSV() {
    const headers = ['ID', '名称', '是否PSA10', '是否已上架', '上架时间', '语言版本', '集换社搜索编号', '集换社游戏语言', '流通品价', 'PSA10价', '价格更新时间', '价格备注', '单价', '数量', '已售数量', '剩余数量', '成本', '已售总收入', '利润', '状态', '来源'];
    const sortedForExport = [...items].sort((a, b) => a.id - b.id);
    const exportRows = sortedForExport.map(i => {
      const totalSellQty = getItemSoldQty(i);
      const totalSellVal = getItemSoldValue(i);
      const remaining = getItemRemainingQty(i);
      return [i.id, i.name, i.isPsa10 ? '是' : '', i.jhsListed ? '是' : '', i.jhsListedAt || '', i.cardLanguage || i.jhsGameLabel || '', i.jhsSearchCode || '', i.jhsGameLabel || '', i.jhsRawPrice ?? '', i.jhsPsa10Price ?? '', i.jhsPriceUpdatedAt || '', i.jhsPriceNote || '', i.unitPrice ?? '', i.qty ?? '', totalSellQty, remaining, i.cost ?? '', totalSellVal || '', getItemSaleProfit(i) ?? '', getItemInventoryStatus(i), i.source];
    });
    const csv = [headers, ...exportRows.map(r => r.map(v => `"${v}"`).join(','))].join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    saveBlobWithPicker(blob, '卡价管理_' + new Date().toISOString().slice(0,10) + '.csv', {
      types: [{ description: 'CSV 文件', accept: { 'text/csv': ['.csv'] } }]
    })
      .then(() => showToast('CSV 已保存 ✓'))
      .catch(() => showToast('CSV 保存失败'));
  }

  function saveBackup() {
    const backupPayload = makeBackupSafeItems(items);
    const backup = {
      version: '1.1',
      exportedAt: new Date().toISOString(),
      note: backupPayload.strippedImageCount > 0 ? '已自动移除内嵌 base64 图片，避免导入后黑屏或本地缓存超限。' : '',
      strippedImageCount: backupPayload.strippedImageCount,
      items: backupPayload.items
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json;charset=utf-8;' });
    const date = new Date().toISOString().slice(0, 10);
    saveBlobWithPicker(blob, '卡价备份_' + date + '.json', {
      types: [{ description: 'JSON 文件', accept: { 'application/json': ['.json'] } }]
    })
      .then(() => {
        if (backupPayload.strippedImageCount > 0) {
          showToast(`备份已保存 ✓ 已精简 ${backupPayload.strippedImageCount} 张内嵌图片`);
        } else {
          showToast('备份已保存 ✓');
        }
      })
      .catch(() => showToast('备份保存失败'));
  }

  // Stats
  const totalCards = items.reduce((sum, i) => sum + (i.qty || 1), 0);
  const totalCost = items.reduce((sum, i) => sum + (i.cost || 0), 0);
  const totalSoldValue = round2(items.filter(i => i.status !== '待签收').reduce((sum, i) => sum + getItemSoldValue(i), 0));
  const totalPendingValue = round2(items.filter(i => i.status === '待签收').reduce((sum, i) => sum + getItemSoldValue(i), 0));
  const totalSoldCost = round2(items.filter(i => i.status !== '未售出' || getItemSoldQty(i) > 0).reduce((sum, i) => sum + getItemSoldCost(i), 0));
  const remainingInventoryValue = round2(items.reduce((sum, i) => {
    const remainingQty = getItemRemainingQty(i);
    const unitPrice = i.unitPrice === null || i.unitPrice === undefined ? 0 : i.unitPrice;
    return sum + (remainingQty * unitPrice);
  }, 0));
  const totalEarned = totalSoldValue + totalPendingValue;
  const toBreakEven = totalCost - totalEarned;
  const totalProfit = round2(items.reduce((sum, i) => sum + (getItemSaleProfit(i) || 0), 0));
  const soldCount = items.filter(i => i.status !== '待签收' && getItemSoldQty(i) > 0 && getItemRemainingQty(i) <= 0).length;
  const pendingCount = items.filter(i => i.status === '待签收').length;
  const partialCount = items.filter(i => i.status !== '待签收' && getItemSoldQty(i) > 0 && getItemRemainingQty(i) > 0).length;
  const unsoldCount = items.filter(i => i.status !== '待签收' && getItemRemainingQty(i) > 0).length;

  function SortIcon({ field }) {
    if (sortField !== field) return <span className="sort-icon">⇅</span>;
    return <span className="sort-icon">{sortDir === 'asc' ? '↑' : '↓'}</span>;
  }

  const statusBadgeClass = (item) => {
    const displayStatus = getItemInventoryStatus(item);
    if (displayStatus === '已售出') return 'status-badge status-sold';
    if (displayStatus === '部分售出') return 'status-badge status-partial';
    if (item.status === '待签收') return 'status-badge status-signed';
    return 'status-badge status-unsold';
  };
  const statusBadgeText = (item) => {
    const displayStatus = getItemInventoryStatus(item);
    if (displayStatus === '已售出') return '● 已售出';
    if (displayStatus === '部分售出') return '◐ 部分售出';
    if (item.status === '待签收') return '● 待签收';
    return '○ 未售出';
  };
  const rowClass = (item) => {
    const displayStatus = getItemInventoryStatus(item);
    if (displayStatus === '已售出') return 'status-sold';
    if (displayStatus === '部分售出') return 'status-partial';
    if (item.status === '待签收') return 'status-signed';
    return '';
  };

  return (
    <div>
      {/* Header */}
      <header className="header">
        <div className="header-inner">
          <div className="header-title">
            <div className="logo">
              <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="17" cy="17" r="16" fill="#1a1a2e" stroke="#444" strokeWidth="1"/>
                <circle cx="17" cy="17" r="16" fill="url(#pb-grad)"/>
                <rect x="1" y="16.5" width="32" height="1" fill="#1a1a2e"/>
                <circle cx="17" cy="17" r="5.5" fill="#f5f5f5" stroke="#1a1a2e" strokeWidth="1.5"/>
                <circle cx="17" cy="17" r="2.5" fill="#1a1a2e"/>
                <defs>
                  <linearGradient id="pb-grad" x1="17" y1="1" x2="17" y2="33" gradientUnits="userSpaceOnUse">
                    <stop stopColor="#e53e3e"/>
                    <stop offset="0.5" stopColor="#e53e3e"/>
                    <stop offset="0.5" stopColor="#f5f5f5"/>
                    <stop offset="1" stopColor="#f5f5f5"/>
                  </linearGradient>
                </defs>
              </svg>
            </div>
            卡价管理后台 <small>卡牌库存系统</small>
          </div>
          <div className="header-actions">
            <div className="header-status-pill">
              <span style={{width:8, height:8, borderRadius:'50%', background:cloudStatusColor, boxShadow:`0 0 10px ${cloudStatusColor}`}}></span>
              <span>云端{cloudStatus}</span>
              {lastCloudSyncAt && <span style={{color:'var(--text-3)'}}>{formatDateTime(lastCloudSyncAt)}</span>}
            </div>
            <button className="btn btn-secondary" onClick={() => setShowCloudConfig(true)}>{cloudBusy ? '☁️ 同步中' : '☁️ 云端设置'}</button>
            <button className="btn btn-secondary" onClick={saveBackup}>💾 保存备份</button>
            <button className="btn btn-secondary" onClick={() => document.getElementById('importFileInput').click()}>📂 导入备份</button>
            <input id="importFileInput" type="file" accept=".json" style={{display:'none'}} onChange={e => {
              const file = e.target.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = ev => {
                try {
                  const data = JSON.parse(ev.target.result);
                  const importedItems = Array.isArray(data) ? data : (data.items || []);
                  const normalizedItems = normalizeItems(importedItems);
                  if (normalizedItems.length === 0) { showToast('文件格式错误或无可导入数据'); return; }
                  if (!confirm(`将导入 ${normalizedItems.length} 条数据，当前数据将被覆盖，确定吗？`)) return;
                  setItems(normalizedItems);
                  showToast('导入成功 ✓');
                } catch { showToast('文件解析失败'); }
              };
              reader.readAsText(file);
              e.target.value = '';
            }} />
            <button className="btn btn-secondary" onClick={exportCSV}>📥 导出 CSV</button>
            <button className="btn btn-secondary" onClick={onLock}>🔒 退出</button>
          </div>
        </div>
      </header>

      {/* Tab Bar */}
      <div className="page-tabs">
        <button className={`filter-btn ${activeTab === 'main' ? 'active' : ''}`} onClick={() => setActiveTab('main')}>📦 卡价管理</button>
        <button className={`filter-btn ${activeTab === '0754' ? 'active' : ''}`} onClick={() => setActiveTab('0754')}>0754 售出</button>
        <button className={`filter-btn ${activeTab === 'old-cards' ? 'active' : ''}`} onClick={() => setActiveTab('old-cards')}>🗂️ 老卡出售记录</button>
      </div>

      {/* Main Tab Content */}
      {activeTab === 'main' && (
      <>
      {/* Stats */}
      <div className="stats-bar">
        <div className="stat-card blue">
          <div className="stat-label">库存成本</div>
          <div className="stat-value">{formatMoney(totalCost)}</div>
          <div className="stat-sub">{unsoldCount} 种在库{partialCount > 0 ? `，${partialCount} 种部分售出` : ''}</div>
          <div className="stat-detail">
            <div className="stat-detail-label">{toBreakEven > 0 ? '距回本还差' : '已超额回本'}</div>
            <div style={{fontSize:18,fontWeight:700,color:toBreakEven > 0 ? 'var(--orange)' : 'var(--green)'}}>{toBreakEven > 0 ? formatMoney(toBreakEven) : formatMoney(-toBreakEven)}</div>
            <div className="stat-detail-note">已收 {formatMoney(totalEarned)}</div>
          </div>
        </div>
        <div className="stat-card green">
          <div className="stat-label">已售总额</div>
          <div className="stat-value green">{formatMoney(totalSoldValue)}</div>
          <div className="stat-sub">{soldCount} 种全量售出{partialCount > 0 ? `，另 ${partialCount} 种部分售出` : ''}</div>
          <div className="stat-detail">
            <div className="stat-detail-label">当前利润</div>
            <div style={{fontSize:18,fontWeight:700,color:totalProfit >= 0 ? 'var(--green)' : 'var(--red)'}}>{totalProfit >= 0 ? '+' : ''}{formatMoney(totalProfit)}</div>
            <div className="stat-detail-note">利润率 {totalSoldValue > 0 ? ((totalProfit / totalSoldCost) * 100).toFixed(1) : 0}%</div>
          </div>
        </div>
        <div className="stat-card primary">
          <div className="stat-label">总卡牌数</div>
          <div className="stat-value">{items.length}</div>
          <div className="stat-sub">{totalCards} 张卡牌</div>
        </div>
        <div className="stat-card blue">
          <div className="stat-label">已售成本</div>
          <div className="stat-value">{formatMoney(totalSoldCost)}</div>
          <div className="stat-sub">已售+待签收</div>
          <div className="stat-detail">
            <div className="stat-detail-label">剩余商品总价</div>
            <div style={{fontSize:18,fontWeight:700,color:'var(--primary)'}}>{formatMoney(remainingInventoryValue)}</div>
          </div>
        </div>
        <div className="stat-card red">
          <div className="stat-label">待签收金额</div>
          <div className="stat-value" style={{color:'var(--red)'}}>{formatMoney(totalPendingValue)}</div>
          <div className="stat-sub">{pendingCount} 种待签收</div>
        </div>
      </div>

      {/* Sticky Content Wrapper */}
      <div className="table-sticky-wrapper">

      {/* Toolbar */}
      <div className="toolbar">
        <div className="search-box">
          <svg className="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          <input placeholder="搜索卡牌名称..." value={search} onChange={e => { setSearch(e.target.value); setPage(1); }} />
        </div>
        <div className="filter-group">
          <button className={`filter-btn ${filter === '全部' ? 'active' : ''}`} onClick={() => { setFilter('全部'); setPage(1); }}>全部</button>
          <button className={`filter-btn ${filter === '未售出' ? 'active' : ''}`} onClick={() => { setFilter('未售出'); setPage(1); }}>未售出</button>
          <button className={`filter-btn ${filter === '已售出' ? 'active-green' : ''}`} onClick={() => { setFilter('已售出'); setPage(1); }}>已售出</button>
          <button className={`filter-btn ${filter === '待签收' ? 'active-orange' : ''}`} onClick={() => { setFilter('待签收'); setPage(1); }}>待签收</button>
        </div>
        <div className="bulk-actions">
          <select value={sortField + '|' + sortDir} onChange={e => {
            const [f, d] = e.target.value.split('|');
            setSortField(f); setSortDir(d); setPage(1);
          }} className="toolbar-select">
            <option value="id|desc">⇅ 默认（最新在前）</option>
            <option value="id|asc">⇅ ID 升序</option>
            <option value="name|asc">⇅ 名称 A→Z</option>
            <option value="name|desc">⇅ 名称 Z→A</option>
            <option value="cardLanguage|asc">⇅ 语言 A→Z</option>
            <option value="unitPrice|desc">⇅ 单价 高→低</option>
            <option value="unitPrice|asc">⇅ 单价 低→高</option>
            <option value="qty|desc">⇅ 数量 多→少</option>
            <option value="cost|desc">⇅ 成本 高→低</option>
            <option value="cost|asc">⇅ 成本 低→高</option>
            <option value="jhsRawPrice|desc">⇅ 流通品涨幅 高→低</option>
            <option value="jhsRawPrice|asc">⇅ 流通品跌幅 高→低</option>
            <option value="jhsPsa10Price|desc">⇅ PSA10涨幅 高→低</option>
            <option value="jhsPsa10Price|asc">⇅ PSA10跌幅 高→低</option>
            <option value="remaining|desc">⇅ 剩余 多→少</option>
            <option value="remaining|asc">⇅ 剩余 少→多</option>
            <option value="soldValue|desc">⇅ 已售额 高→低</option>
            <option value="soldValue|asc">⇅ 已售额 低→高</option>
            <option value="profit|desc">⇅ 利润 高→低</option>
            <option value="profit|asc">⇅ 利润 低→高</option>
          </select>
          <select value={bulkLanguage} onChange={e => setBulkLanguage(e.target.value)} className="toolbar-select" title="批量语言标识">
            <option value="">语言标识</option>
            <option value="宝可梦简中">简中</option>
            <option value="宝可梦繁中">繁中</option>
            <option value="宝可梦日文">日文</option>
            <option value="宝可梦英文">英文</option>
          </select>
          <button className="btn btn-secondary" onClick={() => handleBulkLanguageUpdate('selected')}>应用已选 {selectedIds.length || ''}</button>
          <button className="btn btn-secondary" onClick={() => handleBulkLanguageUpdate('filtered')}>应用当前筛选 {filtered.length}</button>
          {selectedIds.length > 0 && <button className="btn btn-secondary" onClick={() => setSelectedIds([])}>清空选择</button>}
          <button className="btn btn-secondary" onClick={handleBulkMarkSigned}>批量设为待签收</button>
          <button className="btn btn-green-soft" onClick={() => setBulkListingOpen(true)} disabled={selectedIds.length === 0}>批量上架已选 {selectedIds.length || ''}</button>
        </div>
      </div>

      {/* Add Form */}
      {showAdd && <AddCardForm onAdd={handleAdd} onCancel={() => setShowAdd(false)} />}
      {!showAdd && (
        <div className="add-form-toggle" style={{display:'flex', gap:12, flexWrap:'wrap'}}>
          <button className="btn btn-primary" onClick={() => setShowAdd(true)}>+ 添加新卡牌</button>
          <button className="btn btn-gold-soft" onClick={() => setShowScreenshotImport(true)}>🧠 截图识别新增</button>
          <button className="btn btn-green-soft" onClick={() => setBatchImage(true)}>🖼️ 批量添加图片</button>
        </div>
      )}
      {showScreenshotImport && <ScreenshotImportModal onImport={handleImportRecognized} onClose={() => setShowScreenshotImport(false)} showToast={showToast} />}
      {batchImage && <BatchImageModal items={items} onUpdate={setItems} onClose={() => setBatchImage(false)} showToast={showToast} />}

      {/* Table */}
      <div className="table-container">
        <div className="table-wrap">
          <div className="table-scroll">
          <table className="main-card-table">
            <thead>
              <tr>
                <th style={{width: 44, textAlign:'center'}}>
                  <input type="checkbox" checked={isPageSelected} onChange={e => toggleSelectPage(e.target.checked)} title="选择当前页" />
                </th>
                <th style={{width: 60, textAlign:'center'}} onClick={() => handleSort('id')} className={sortField === 'id' ? 'sorted' : ''}>ID <SortIcon field="id"/></th>
                <th style={{width: 56, textAlign:'center'}}>图</th>
                <th onClick={() => handleSort('name')} className={sortField === 'name' ? 'sorted' : ''}>卡牌名称 <SortIcon field="name"/></th>
                <th onClick={() => handleSort('cardLanguage')} className={sortField === 'cardLanguage' ? 'sorted' : ''} style={{width:62,textAlign:'center'}}>语 <SortIcon field="cardLanguage"/></th>
                <th onClick={() => handleSort('unitPrice')} className={sortField === 'unitPrice' ? 'sorted' : ''} style={{textAlign:'right'}}>单价 <SortIcon field="unitPrice"/></th>
                <th onClick={() => handleSort('qty')} className={sortField === 'qty' ? 'sorted' : ''} style={{textAlign:'right'}}>数量 <SortIcon field="qty"/></th>
                <th onClick={() => handleSort('remaining')} className={sortField === 'remaining' ? 'sorted' : ''} style={{textAlign:'right'}}>剩余 <SortIcon field="remaining"/></th>
                <th onClick={() => handleSort('cost')} className={sortField === 'cost' ? 'sorted' : ''} style={{textAlign:'right'}}>成本 <SortIcon field="cost"/></th>
                <th onClick={() => handleSort('jhsRawPrice')} className={sortField === 'jhsRawPrice' ? 'sorted' : ''} style={{textAlign:'right'}}>流通品 <SortIcon field="jhsRawPrice"/></th>
                <th onClick={() => handleSort('jhsPsa10Price')} className={sortField === 'jhsPsa10Price' ? 'sorted' : ''} style={{textAlign:'right'}}>PSA10 <SortIcon field="jhsPsa10Price"/></th>
                <th onClick={() => handleSort('soldValue')} className={sortField === 'soldValue' ? 'sorted' : ''} style={{textAlign:'right', fontSize: 11}}>已售 <SortIcon field="soldValue"/></th>
                <th onClick={() => handleSort('profit')} className={sortField === 'profit' ? 'sorted' : ''} style={{textAlign:'right'}}>利润 <SortIcon field="profit"/></th>
                <th onClick={() => handleSort('status')} className={sortField === 'status' ? 'sorted' : ''} style={{width:100}}>状态 <SortIcon field="status"/></th>
                <th className="action-col" style={{width: 188}}>操作</th>
              </tr>
            </thead>
            <tbody>
              {paginated.length === 0 ? (
                <tr><td colSpan={15}><div className="empty-state"><div className="empty-icon">📭</div>没有找到匹配的卡牌</div></td></tr>
              ) : paginated.map((item, idx) => (
                <tr key={item.id} className={rowClass(item)}>
                  <td style={{textAlign:'center'}}>
                    <input type="checkbox" checked={selectedIdSet.has(item.id)} onChange={e => toggleSelectItem(item.id, e.target.checked)} title={`选择 ${item.name}`} />
                  </td>
                  <td style={{color: 'var(--text-3)', fontSize: 12, textAlign:'center'}}>{item.id}</td>
                  <td>
                    {item.imageUrl ? (
                      <img
                        src={item.imageUrl}
                        alt={item.name}
                        style={{width:40,height:40,objectFit:'contain',borderRadius:10,border:'1px solid var(--border)',background:'#111111',cursor:'pointer',flexShrink:0}}
                        onClick={() => setZoomedImage(item.imageUrl)}
                        onError={e => { e.target.style.display='none'; }}
                      />
                    ) : (
                      <div style={{width:40,height:40,borderRadius:10,border:'1px dashed var(--border)',background:'#111111',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,cursor:'pointer',flexShrink:0,color:'var(--primary)'}} title={`为「${item.name}」搜索图片`} onClick={e => { e.stopPropagation(); window.open(`https://www.google.com/search?tbm=isch&q=${encodeURIComponent(item.name + ' 宝可梦卡牌')}`, '_blank'); }}>🔍</div>
                    )}
                  </td>
                  <td className="card-name">
                    <span className="card-name-line">
                      <span>{item.name}</span>
                      {item.isPsa10 && <span className="psa10-badge">PSA10</span>}
                      {item.jhsListed && (
                        <span className="listed-badge" title={item.jhsListedAt ? `上架时间：${formatDateTime(item.jhsListedAt)}` : '已上架'}>
                          已上架
                          <button
                            type="button"
                            className="listed-badge-remove"
                            title="取消已上架标签"
                            onClick={e => {
                              e.stopPropagation();
                              clearListedTag(item.id);
                            }}
                          >×</button>
                        </span>
                      )}
                    </span>
                  </td>
                  <td style={{textAlign:'center'}}>
                    {(item.cardLanguage || item.jhsGameLabel) ? <span className="language-badge" title={item.cardLanguage || item.jhsGameLabel}>{languageShortLabel(item.cardLanguage || item.jhsGameLabel)}</span> : <span style={{color:'var(--text-3)'}}>—</span>}
                  </td>
                  <td className="price-cell" style={{textAlign:'right'}}>
                    {item.unitPrice !== null ? '¥' + item.unitPrice.toLocaleString('zh-CN', {minimumFractionDigits:2}) : '—'}
                    {renderUnitReferenceDelta(item)}
                  </td>
                  <td className="price-cell" style={{textAlign:'right'}}>{item.qty ?? '—'}</td>
                  <td className="price-cell" style={{textAlign:'right', color: 'var(--text-3)'}}>
                    {getItemRemainingQty(item)}
                  </td>
                  <td className="price-cell" style={{textAlign:'right'}}>{item.cost !== null ? formatMoney(item.cost) : '—'}</td>
                  <td className="price-cell" style={{textAlign:'right'}}>
                    {formatMoney(item.jhsRawPrice)}
                    {renderPriceDelta(item, 'raw')}
                    {item.jhsPriceUpdatedAt && <span className="price-meta">{formatPriceUpdatedAt(item.jhsPriceUpdatedAt)}</span>}
                  </td>
                  <td className="price-cell" style={{textAlign:'right'}}>
                    {formatMoney(item.jhsPsa10Price)}
                    {renderPriceDelta(item, 'psa10')}
                    {item.jhsPriceNote && (
                      <span className="price-note-wrap">
                        <span
                          className="price-note-icon"
                          tabIndex="0"
                          aria-label={`价格备注：${item.jhsPriceNote}`}
                          onMouseEnter={e => showPriceNoteTooltip(e, item.jhsPriceNote)}
                          onMouseLeave={hidePriceNoteTooltip}
                          onFocus={e => showPriceNoteTooltip(e, item.jhsPriceNote)}
                          onBlur={hidePriceNoteTooltip}
                        >!</span>
                      </span>
                    )}
                  </td>
                  <td className="price-cell" style={{textAlign:'right', color: 'var(--green)', fontWeight:600}}>
                    {getItemSoldQty(item) > 0
                      ? (() => {
                          const totalQty = getItemSoldQty(item);
                          const totalVal = getItemSoldValue(item);
                          return `${totalQty}张 ¥${totalVal.toFixed(2)}`;
                        })()
                      : '—'}
                  </td>
                  <td className="price-cell" style={{textAlign:'right'}}>
                    {getItemSaleProfit(item) !== null ? (
                      <span className={getItemSaleProfit(item) > 0 ? 'profit-positive' : getItemSaleProfit(item) < 0 ? 'profit-negative' : 'profit-zero'}>
                        {getItemSaleProfit(item) > 0 ? '+' : ''}{formatMoney(getItemSaleProfit(item))}
                      </span>
                    ) : '—'}
                  </td>
                  <td><span className={statusBadgeClass(item)}>{statusBadgeText(item)}</span></td>
                  <td className="action-col">
                    <div className="row-actions">
                      <button className="action-btn action-btn-listing" onClick={() => setListingItem(item)}>上架</button>
                      <button className="action-btn" onClick={() => setEditingItem(item)}>编辑</button>
                      <button className="action-btn" style={{color:'var(--red)', borderColor:'var(--red-border)', background:'var(--red-bg)'}} onClick={() => handleDelete(item.id)}>删除</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          </div>

          {/* Pagination */}
          {totalPages > 1 && (
            <div style={{padding:'16px', display:'flex', justifyContent:'space-between', alignItems:'center', borderTop:'1px solid var(--border)'}}>
              <div style={{fontSize:13, color:'var(--text-2)'}}>
                显示 {(page-1)*PAGE_SIZE + 1}–{Math.min(page*PAGE_SIZE, filtered.length)}，共 {filtered.length} 条
              </div>
              <div style={{display:'flex', gap:4}}>
                <button className="btn btn-secondary" disabled={page === 1} onClick={() => setPage(p => p-1)}>‹ 上一页</button>
                {Array.from({length: Math.min(5, totalPages)}, (_, i) => {
                  let p = i + 1;
                  if (totalPages > 5) {
                    if (page > 3) p = page - 2 + i;
                    if (page > totalPages - 2) p = totalPages - 4 + i;
                  }
                  if (p < 1 || p > totalPages) return null;
                  return <button key={p} className={`btn ${page === p ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setPage(p)} style={{minWidth:40}}>{p}</button>;
                })}
                <button className="btn btn-secondary" disabled={page === totalPages} onClick={() => setPage(p => p+1)}>下一页 ›</button>
              </div>
            </div>
          )}
        </div>

        <div style={{textAlign:'center', fontSize:12, color:'var(--text-2)', marginTop:12}}>
          <div className="color-legend" style={{justifyContent:'center'}}>
            <div className="color-legend-item"><div className="color-dot gray"></div>未售出</div>
            <div className="color-legend-item"><div className="color-dot green"></div>已售出</div>
            <div className="color-legend-item"><div className="color-dot orange"></div>待签收</div>
          </div>
        </div>
      </div>
      </div>
      </>
      )}

      {/* Modal */}
      {editingItem && <EditModal item={editingItem} onSave={handleSave} onClose={() => setEditingItem(null)} onToast={setToast} />}
      {listingItem && <JhsListingModal item={listingItem} onSave={handleListingSave} onListed={handleListingDone} onClose={() => setListingItem(null)} onToast={setToast} />}
      {bulkListingOpen && <BulkJhsListingModal items={selectedItems} onListed={handleBulkListingDone} onClose={() => setBulkListingOpen(false)} onToast={setToast} />}
      {showCloudConfig && (
        <CloudConfigModal
          config={cloudForm}
          status={cloudStatus}
          error={cloudError}
          saving={cloudBusy}
          lastSyncedAt={lastCloudSyncAt}
          onChange={handleCloudFormChange}
          onSave={handleCloudSave}
          onDisconnect={handleCloudDisconnect}
          onClose={() => setShowCloudConfig(false)}
        />
      )}

      {/* Toast */}
      {toast && <Toast message={toast} onDone={() => setToast(null)} />}
      {priceNoteTooltip && (
        <div
          className="price-note-tooltip"
          style={{
            left: priceNoteTooltip.x,
            top: priceNoteTooltip.y,
            transform: 'translate(-100%, -100%)'
          }}
        >
          {priceNoteTooltip.text}
        </div>
      )}

      {/* 0754 售出 Tab */}
      {activeTab === '0754' && <Tab0754 showToast={showToast} supabaseConfig={supabaseConfig} />}

      {/* 老卡出售记录 Tab */}
      {activeTab === 'old-cards' && <OldCardInventoryTab showToast={showToast} supabaseConfig={supabaseConfig} />}

      {/* Image Zoom Modal */}
      {zoomedImage && (
        <div style={{
          position:'fixed', inset:0, background:'rgba(0,0,0,0.85)',
          display:'flex', alignItems:'center', justifyContent:'center',
          zIndex:9999, cursor:'zoom-out', padding:24
        }} onClick={() => setZoomedImage(null)}>
          <img
            src={zoomedImage}
            alt="放大图片"
            style={{
              maxWidth:'100%', maxHeight:'100%', objectFit:'contain',
              borderRadius:12, boxShadow:'0 20px 60px rgba(0,0,0,0.5)',
              cursor:'default'
            }}
            onClick={e => e.stopPropagation()}
          />
          <button
            onClick={() => setZoomedImage(null)}
            style={{
              position:'absolute', top:16, right:20,
              background:'rgba(255,255,255,0.15)', border:'none',
              color:'#fff', fontSize:20, width:40, height:40,
              borderRadius:'50%', cursor:'pointer', lineHeight:1
            }}
          >✕</button>
        </div>
      )}
    </div>
  );
}

function ProtectedApp() {
  const [isUnlocked, setIsUnlocked] = useState(() => readAccessGranted());

  function handleUnlock() {
    setIsUnlocked(true);
  }

  function handleLock() {
    writeAccessGranted(false);
    setIsUnlocked(false);
  }

  return isUnlocked ? <App onLock={handleLock} /> : <PasswordGate onUnlock={handleUnlock} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<ProtectedApp />);
const fallbackAuthShell = document.getElementById('auth-fallback');
if (fallbackAuthShell) fallbackAuthShell.style.display = 'none';
</script>
</body>
</html>
