<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡价管理后台</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Manrope:wght@400;500;600;700&family=Nunito:wght@500;600;700;800;900&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #171717;
      --surface: rgba(23, 23, 23, 0.92);
      --surface-solid: #171717;
      --surface-2: rgba(15, 15, 15, 0.92);
      --surface-3: #111111;
      --primary: #3ecf8e;
      --primary-light: #00c573;
      --primary-dim: rgba(62, 207, 142, 0.12);
      --accent: #3ecf8e;
      --accent-dim: rgba(62, 207, 142, 0.12);
      --green: #3ecf8e;
      --green-bg: rgba(62, 207, 142, 0.1);
      --green-border: rgba(62, 207, 142, 0.3);
      --orange: #f59e0b;
      --orange-bg: rgba(245, 158, 11, 0.1);
      --orange-border: rgba(245, 158, 11, 0.25);
      --red: #fb7185;
      --red-bg: rgba(251, 113, 133, 0.12);
      --red-border: rgba(251, 113, 133, 0.24);
      --text: #fafafa;
      --text-2: #b4b4b4;
      --text-3: #898989;
      --border: #2e2e2e;
      --border-bright: rgba(62, 207, 142, 0.3);
      --shadow-sm: none;
      --shadow: none;
      --shadow-lg: 0 14px 42px rgba(0, 0, 0, 0.35);
      --radius: 16px;
      --radius-sm: 8px;
      --radius-pill: 9999px;
      --mono-font: 'Source Code Pro', 'SF Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Manrope', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      padding-top: 82px;
      background-image:
        radial-gradient(circle at 0% 0%, rgba(62, 207, 142, 0.08) 0%, transparent 26%),
        radial-gradient(circle at 100% 18%, rgba(99, 102, 241, 0.06) 0%, transparent 24%);
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
    }
    #root { min-height: 100vh; position: relative; z-index: 1; }

    .header {
      background: rgba(23, 23, 23, 0.9);
      border-bottom: 1px solid #242424;
      padding: 0 32px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 40;
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 82px;
      gap: 16px;
      padding: 14px 0;
    }
    .header-title {
      font-family: 'Manrope', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 24px;
      font-weight: 400;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: -0.02em;
    }
    .header-title .logo {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
    }
    .header-title .logo svg {
      border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(62, 207, 142, 0.18);
    }
    .header-title small {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-3);
      letter-spacing: 0;
    }
    .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

    .page-tabs {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 32px 8px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .header-status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: #0f0f0f;
      color: var(--text-2);
      font-size: 12px;
      font-weight: 500;
    }

    .btn {
      padding: 10px 16px;
      border-radius: var(--radius-pill);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Manrope', sans-serif;
      transition: all 0.18s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn-primary {
      background: #0f0f0f;
      color: #fafafa;
      border: 1px solid #fafafa;
    }
    .btn-primary:hover {
      background: #151515;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: #0f0f0f;
      color: var(--text-2);
      border: 1px solid #2e2e2e;
    }
    .btn-secondary:hover {
      background: #111111;
      color: #fafafa;
      border-color: #393939;
      transform: translateY(-1px);
    }
    .btn-danger { background: rgba(127,29,29,0.18); color: var(--red) !important; border: 1px solid var(--red-border); }
    .btn-danger:hover { background: rgba(127,29,29,0.28); }
    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border);
      padding: 6px 10px;
      font-size: 12px;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.02); color: var(--text); }
    .btn-gold-soft {
      background: #0f0f0f;
      color: #fafafa;
      border: 1px solid #2e2e2e;
    }
    .btn-green-soft {
      background: #0f0f0f;
      color: var(--green);
      border: 1px solid var(--green-border);
    }

    .stats-bar {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 32px 8px;
      display: grid;
      position: sticky;
      position: -webkit-sticky;
      top: 82px;
      z-index: 20;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      background: linear-gradient(180deg, rgba(23, 23, 23, 0.98) 78%, rgba(23, 23, 23, 0.9) 100%);
      backdrop-filter: blur(12px) saturate(110%);
      -webkit-backdrop-filter: blur(12px) saturate(110%);
      border-bottom: 1px solid #242424;
    }
    .stat-card {
      background: #171717;
      border-radius: 16px;
      padding: 20px 22px;
      border: 1px solid #2e2e2e;
      transition: transform 0.25s ease, border-color 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.primary::before,
    .stat-card.green::before,
    .stat-card.blue::before,
    .stat-card.accent::before { background: linear-gradient(90deg, #3ecf8e, rgba(62,207,142,0.18)); }
    .stat-card.orange::before { background: linear-gradient(90deg, #f59e0b, rgba(245,158,11,0.18)); }
    .stat-card.red::before { background: linear-gradient(90deg, #fb7185, rgba(251,113,133,0.18)); }
    .stat-card:hover {
      transform: translateY(-2px);
      border-color: #393939;
    }
    .stat-label {
      font-family: var(--mono-font);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: 'Manrope', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 24px;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .stat-value.green { color: var(--green); }
    .stat-value.orange { color: var(--orange); }
    .stat-sub { font-size: 12px; color: var(--text-3); margin-top: 8px; font-weight: 400; }
    .stat-detail {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #242424;
    }
    .stat-detail-label {
      font-size: 11px;
      color: var(--text-3);
      margin-bottom: 4px;
      font-weight: 500;
    }
    .stat-detail-note {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 4px;
      font-weight: 400;
    }

    .toolbar-select {
      padding: 10px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: #0f0f0f;
      color: var(--text-2);
      font-size: 13px;
      font-weight: 500;
      font-family: 'Manrope', sans-serif;
      cursor: pointer;
      outline: none;
    }
    .toolbar-select:focus {
      border-color: rgba(62, 207, 142, 0.3);
      box-shadow: 0 0 0 1px rgba(62, 207, 142, 0.3);
    }
    .thumb-shell {
      border-radius: 12px;
      border: 1px solid #2e2e2e;
      background: #111111;
    }

    .toolbar {
      max-width: 1400px;
      margin: 0 auto 18px;
      padding: 16px 32px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .table-sticky-wrapper {
      position: sticky;
      position: -webkit-sticky;
      top: 182px;
      z-index: 15;
      background: linear-gradient(180deg, rgba(23,23,23,0.98) 0%, rgba(23,23,23,0.92) 100%);
    }
    .search-box { flex: 1; min-width: 240px; position: relative; }
    .search-box input {
      width: 100%;
      padding: 13px 18px 13px 44px;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      font-size: 14px;
      font-family: 'Manrope', sans-serif;
      outline: none;
      transition: all 0.2s;
      background: #111111;
      color: var(--text);
    }
    .search-box input:focus { border-color: rgba(62,207,142,0.45); box-shadow: 0 0 0 1px rgba(62,207,142,0.3); }
    .search-box input::placeholder { color: var(--text-3); }
    .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-3); pointer-events: none; }
    .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      padding: 10px 15px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: #111111;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Manrope', sans-serif;
      color: var(--text-2);
      transition: all 0.18s ease;
    }
    .filter-btn:hover { border-color: rgba(62,207,142,0.3); color: var(--primary); background: rgba(255,255,255,0.02); }
    .filter-btn.active { background: rgba(62,207,142,0.12); color: var(--primary); border-color: rgba(62,207,142,0.3); font-weight: 500; }
    .filter-btn.active-green { background: var(--green-bg); color: var(--green); border-color: var(--green-border); font-weight: 500; }
    .filter-btn.active-orange { background: var(--orange-bg); color: var(--orange); border-color: var(--orange-border); font-weight: 500; }

    .table-container { max-width: 1400px; margin: 0 auto 48px; padding: 0 32px; }
    .table-wrap {
      background: #171717;
      border-radius: 16px;
      border: 1px solid #2e2e2e;
      overflow-x: auto;
      overflow-y: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    .main-card-table { min-width: 1380px; }
    .old-card-table { min-width: 1080px; }
    thead { background: #111111; }
    th {
      padding: 14px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
      font-family: var(--mono-font);
      text-transform: uppercase;
    }
    th:hover { color: var(--primary); }
    th.sorted { color: var(--primary); }
    th .sort-icon { margin-left: 4px; font-size: 10px; opacity: 0.6; }
    td {
      padding: 14px 16px;
      border-bottom: 1px solid #242424;
      vertical-align: middle;
      font-size: 13px;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    tr.status-sold td { background: var(--green-bg); }
    tr.status-sold:hover td { background: rgba(62,207,142,0.14); }
    tr.status-signed td { background: var(--orange-bg); }
    tr.status-signed:hover td { background: rgba(245,158,11,0.14); }
    th.action-col,
    td.action-col {
      position: sticky;
      right: 0;
      z-index: 2;
      min-width: 132px;
      background: #171717;
      box-shadow: -12px 0 18px rgba(0,0,0,0.22);
    }
    th.action-col { z-index: 4; background: #111111; }
    tr:hover td.action-col { background: #1c1c1c; }
    tr.status-sold td.action-col { background: var(--green-bg); }
    tr.status-sold:hover td.action-col { background: rgba(62,207,142,0.14); }
    tr.status-signed td.action-col { background: var(--orange-bg); }
    tr.status-signed:hover td.action-col { background: rgba(245,158,11,0.14); }
    .row-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      white-space: nowrap;
    }

    .card-name { font-weight: 500; font-size: 15px; color: var(--text); }
    .price-meta {
      display: block;
      margin-top: 3px;
      color: var(--text-3);
      font-size: 10px;
      font-family: var(--mono-font);
      white-space: nowrap;
    }
    .price-delta {
      display: block;
      margin-top: 3px;
      font-size: 10px;
      font-family: var(--mono-font);
      white-space: nowrap;
    }
    .price-delta.up { color: var(--green); }
    .price-delta.down { color: var(--red); }
    .price-delta.flat { color: var(--text-3); }
    .price-note-wrap {
      display: flex;
      justify-content: flex-end;
      margin-top: 3px;
    }
    .price-note-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid rgba(245,158,11,0.45);
      background: rgba(245,158,11,0.12);
      color: var(--orange);
      font-size: 9px;
      font-weight: 700;
      line-height: 1;
      cursor: help;
    }
    .price-note-tooltip {
      position: fixed;
      z-index: 10000;
      max-width: min(320px, calc(100vw - 32px));
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(245,158,11,0.32);
      background: #1f1710;
      color: var(--text);
      box-shadow: 0 12px 30px rgba(0,0,0,0.36);
      font-size: 12px;
      line-height: 1.55;
      text-align: left;
      white-space: normal;
      word-break: break-word;
      pointer-events: none;
    }
    .language-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 24px;
      padding: 0 8px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: var(--text-2);
      font-size: 11px;
      font-weight: 600;
    }
    tbody tr img { transition: all 0.15s ease; cursor: zoom-in; border-radius: var(--radius-sm); }
    tbody tr img:hover { opacity: 0.85; transform: scale(1.05); }

    .mono { font-variant-numeric: tabular-nums; font-family: var(--mono-font); font-size: 13px; }
    .profit-positive { color: var(--green); font-weight: 500; }
    .profit-negative { color: var(--red); font-weight: 500; }
    .profit-zero { color: var(--text-3); }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      letter-spacing: 0.3px;
    }
    .status-unsold { background: #111111; color: var(--text-3); border: 1px solid var(--border); }
    .status-sold { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .status-signed { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }

    .action-btn {
      padding: 8px 12px;
      flex: 0 0 auto;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #111111;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      font-family: 'Manrope', sans-serif;
      transition: all 0.18s ease;
      color: var(--text-2);
    }
    .action-btn:hover { background: rgba(255,255,255,0.02); color: var(--text); border-color: #393939; transform: translateY(-1px); }
    .action-btn.delete:hover { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }

    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-3); }
    .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 20000; padding: 20px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: rgba(23, 23, 23, 0.96);
      backdrop-filter: blur(16px) saturate(110%);
      -webkit-backdrop-filter: blur(16px) saturate(110%);
      border-radius: 16px;
      width: 100%; max-width: 500px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-height: 90vh; overflow-y: auto;
      position: relative;
      z-index: 20001;
      border: 1px solid #2e2e2e;
    }
    @keyframes slideUp { from { transform: translateY(20px) scale(0.97); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid #242424;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0;
      background: rgba(23, 23, 23, 0.96);
      z-index: 1;
    }
    .modal-title { font-family: 'Manrope', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 400; color: var(--text); letter-spacing: -0.02em; }
    .modal-close {
      width: 36px; height: 36px; border-radius: 8px; border: 1px solid #2e2e2e;
      background: #111111; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; color: var(--text-2);
    }
    .modal-close:hover { background: var(--red-bg); color: var(--red); }
    .modal-body { padding: 22px 24px; }
    .modal-section-title {
      font-size: 11px; font-weight: 400; color: var(--text-3);
      letter-spacing: 1.2px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
      text-transform: uppercase;
      font-family: var(--mono-font);
    }
    .modal-section-title::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .profit-summary { background: #111111; border-radius: 12px; padding: 16px 18px; border: 1px solid var(--border); }
    .profit-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-2); margin-bottom: 6px; }
    .profit-row:last-child { margin-bottom: 0; }
    .profit-row.total { font-weight: 500; color: var(--text); font-size: 14px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
    .profit-row.total.positive { color: var(--green); }
    .profit-row.total.negative { color: var(--red); }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 7px; letter-spacing: 0.1px; }
    .form-input {
      width: 100%; padding: 10px 14px;
      border: 1px solid #363636;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Manrope', sans-serif;
      outline: none; transition: all 0.18s;
      background: #0f0f0f;
      color: var(--text);
    }
    .form-input:focus { border-color: rgba(62,207,142,0.36); box-shadow: 0 0 0 1px rgba(62,207,142,0.3); }
    .form-input::placeholder { color: var(--text-3); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .status-options { display: flex; gap: 8px; }
    .status-option {
      flex: 1; padding: 10px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer; text-align: center;
      font-size: 13px; font-weight: 500;
      font-family: 'Manrope', sans-serif;
      transition: all 0.18s ease;
      background: #0f0f0f;
      color: var(--text-2);
    }
    .status-option:hover { border-color: var(--primary); color: var(--primary); }
    .status-option.selected-unsold { border-color: #393939; background: #111111; color: var(--text-3); }
    .status-option.selected-sold { border-color: var(--green); background: var(--green-bg); color: var(--green); }
    .status-option.selected-signed { border-color: var(--orange); background: var(--orange-bg); color: var(--orange); }
    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid #242424;
      display: flex; gap: 10px; justify-content: flex-end;
      background: #111111;
    }
    .modal-footer .btn { min-width: 90px; justify-content: center; }

    .add-form-toggle { max-width: 1400px; margin: 0 auto 16px; padding: 0 32px; }
    .add-form-toggle .btn { width: 100%; justify-content: center; padding: 13px; font-size: 14px; }
    .add-form { max-width: 1400px; margin: 0 auto 16px; padding: 0 32px; }
    .add-form-card {
      background: #171717;
      border-radius: 16px;
      border: 1px solid #2e2e2e;
      padding: 22px;
    }
    .add-form-title {
      font-size: 14px; font-weight: 500; margin-bottom: 16px;
      color: var(--text);
    }
    .add-form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr; gap: 12px; align-items: end; }
    .add-form-grid .form-group { margin-bottom: 0; }

    .bulk-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-legend { display: flex; gap: 16px; align-items: center; font-size: 12px; color: var(--text-3); font-weight: 500; }
    .color-legend-item { display: flex; align-items: center; gap: 5px; }
    .color-dot { width: 10px; height: 10px; border-radius: 50%; }
    .color-dot.green { background: var(--green); }
    .color-dot.orange { background: var(--orange); }
    .color-dot.gray { background: var(--text-3); }

    .toast {
      position: fixed; bottom: 28px; right: 28px;
      background: #111111;
      color: var(--text);
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 14px; font-weight: 500;
      z-index: 9999;
      animation: toastIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: var(--shadow-lg);
      border: 1px solid #2e2e2e;
      letter-spacing: 0.2px;
    }
    @keyframes toastIn { from { transform: translateY(20px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

    .auth-shell {
      min-height: calc(100vh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .auth-card {
      width: min(460px, 100%);
      background: rgba(23, 23, 23, 0.96);
      border: 1px solid #2e2e2e;
      border-radius: 16px;
      padding: 28px;
      box-shadow: var(--shadow-lg);
    }
    .auth-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(62,207,142,0.1);
      border: 1px solid rgba(62,207,142,0.24);
      color: var(--primary);
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 16px;
    }
    .auth-title {
      font-family: 'Manrope', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 32px;
      font-weight: 400;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
    }
    .auth-subtitle {
      color: var(--text-2);
      line-height: 1.7;
      margin-bottom: 22px;
    }
    .auth-error {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(248,81,73,0.12);
      border: 1px solid rgba(248,81,73,0.28);
      color: var(--red);
      font-size: 13px;
      font-weight: 500;
    }
    .auth-hint {
      margin-top: 16px;
      color: var(--text-3);
      font-size: 12px;
      line-height: 1.6;
    }

    .summary-row td { background: #111111 !important; font-weight: 500; color: var(--text-2); font-size: 12px; }

    @media (max-width: 1100px) { .stats-bar { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) {
      body { padding-top: 96px; }
      .header { padding: 0 16px; }
      .header-inner { flex-wrap: wrap; height: auto; padding: 12px 0; gap: 10px; }
      .page-tabs { padding: 16px 16px 8px; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); padding: 12px 16px 8px; top: 96px; }
      .toolbar { flex-direction: column; padding: 12px 16px; }
      .filter-group { width: 100%; overflow-x: auto; flex-wrap: nowrap; }
      .main-card-table { min-width: 1380px; }
      .old-card-table { min-width: 1080px; }
      .add-form-grid { grid-template-columns: 1fr 1fr; }
      .add-form { padding: 0 16px; }
      .add-form-toggle { padding: 0 16px; }
      .table-container { padding: 0 16px; }
      .table-sticky-wrapper { top: 200px; }
    }
    @media (max-width: 480px) {
      .stats-bar { grid-template-columns: 1fr 1fr; gap: 10px; }
      .stat-value { font-size: 22px; }
    }

  const input = new TextEncoder().encode(String(value || ''));
  const digest = await crypto.subtle.digest('SHA-256', input);

    return byte.toString(16).padStart(2, '0');

    } else {
      lines.push({
        words: [word],
        x0: word.x0,
        y0: word.y0,
        x1: word.x1,
        y1: word.y1,
        cy: word.cy
      });
    }
  }
  return lines.map(line => buildLineFromWords(line.words));
}

function parseProductsFromOcrWords(words) {
  const normalizedWords = (words || [])
    .map(normalizeOcrWord)
    .filter(Boolean);

  const lines = groupOcrWordsIntoLines(words)
    .map(line => ({ ...line, text: normalizeOcrLine(line.text) }))
    .filter(line => line.text);

  if (!lines.length || !normalizedWords.length) return [];

  const pageWidth = Math.max(...lines.map(line => line.x1), 1);
  const codeLines = lines.filter(line => extractCardCodeFromLine(line.text));
  if (!codeLines.length) return [];

  const products = codeLines.map((codeLine, index) => {
    const prev = codeLines[index - 1];
    const next = codeLines[index + 1];
    const upperBound = prev ? (prev.cy + codeLine.cy) / 2 : 0;
    const lowerBound = next ? (codeLine.cy + next.cy) / 2 : Number.POSITIVE_INFINITY;
    const blockLines = lines.filter(line => line.cy >= upperBound && line.cy < lowerBound);
    const blockWords = normalizedWords.filter(word => word.cy >= upperBound && word.cy < lowerBound);
    const leftWords = blockWords.filter(word => word.x0 < pageWidth * 0.72);
    const rightWords = blockWords.filter(word => word.x0 >= pageWidth * 0.72);
    const rightText = rightWords
      .sort((a, b) => (a.cy - b.cy) || (a.x0 - b.x0))
      .map(word => word.text)
      .join(' ');

    let name = '';
    const nameWords = leftWords
      .filter(word => word.cy <= codeLine.cy - 6)
      .filter(word => !extractPriceFromLine(word.text))
      .filter(word => !extractQtyFromLine(word.text))
      .filter(word => !extractCardCodeFromLine(word.text))
      .filter(word => !isIgnoredOcrLine(word.text))
      .sort((a, b) => a.x0 - b.x0);
    if (nameWords.length > 0) {
      name = extractNameFromWords(nameWords);
    }

    let price = null;
    price = extractPriceFromLine(rightText);
    if (price === null) {
      const priceCandidates = blockLines
        .map(line => extractPriceFromLine(line.text))
        .filter(value => value !== null);
      if (priceCandidates.length > 0) price = priceCandidates[0];
    }

    let qty = null;
    qty = extractQtyFromLine(rightText);
    if (qty === null) {
      const qtyCandidates = blockLines
        .map(line => extractQtyFromLine(line.text))
        .filter(value => value !== null);
      if (qtyCandidates.length > 0) qty = qtyCandidates[qtyCandidates.length - 1];
    }

    if (!name) {
      const fallback = blockLines
        .map(line => extractNameFromWords(line.words))
        .filter(Boolean)
        .map(text => ({ text }))
        .sort((a, b) => a.text.length - b.text.length)[0];
      name = fallback ? fallback.text : '';
    }

    if (!name) {
      const fallbackLine = blockLines
        .filter(line => isLikelyNameLine(line.text))
        .sort((a, b) => a.cy - b.cy)[0];
      name = fallbackLine ? cleanupRecognizedName(fallbackLine.text) : '';
    }

    const cardCode = extractCardCodeFromLine(codeLine.text);
    if (!name || !cardCode) return null;

    const quantity = qty || 1;
    const unitPrice = price === null ? null : price;
    return {
      name,
      cardCode,
      unitPrice,
      qty: quantity,
      cost: unitPrice === null ? 0 : round2(unitPrice * quantity),
      status: '未售出',
      source: '截图识别',
      sells: [],
      profit: null
    };
  }).filter(Boolean);

  const seen = new Set();
  return products.filter(item => {
    const key = [item.name, item.cardCode, item.unitPrice, item.qty].join('|');
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function parseProductsFromScreenshotText(rawText) {
  const lines = String(rawText || '')
    .split(/\n+/)
    .map(normalizeOcrLine)
    .filter(Boolean);

  const codeIndexes = [];
  lines.forEach((line, index) => {
    if (extractCardCodeFromLine(line)) codeIndexes.push(index);
  });

  const products = [];

  function buildProductFromBlock(codeIdx, blockStart, blockEnd) {
    const code = extractCardCodeFromLine(lines[codeIdx]);
    if (!code) return null;

    let name = '';
    for (let i = codeIdx - 1; i >= blockStart; i -= 1) {
      if (isLikelyNameLine(lines[i])) {
        name = cleanupRecognizedName(lines[i]);
        break;
      }
    }

    let price = null;
    let qty = null;
    for (let i = codeIdx; i < blockEnd; i += 1) {
      if (price === null) price = extractPriceFromLine(lines[i]);
      if (qty === null) qty = extractQtyFromLine(lines[i]);
    }

    if (!name) {
      return null;
    }

    const unitPrice = price === null ? null : price;
    const quantity = qty || 1;
    const cost = unitPrice === null ? 0 : round2(unitPrice * quantity);

    return {
      name,
      cardCode: code,
      unitPrice,
      qty: quantity,
      cost,
      status: '未售出',
      source: '截图识别',
      sells: [],
      profit: null
    };
  }

  if (codeIndexes.length > 0) {
    codeIndexes.forEach((codeIdx, position) => {
      const blockStart = position === 0 ? 0 : codeIndexes[position - 1] + 1;
      const blockEnd = position === codeIndexes.length - 1 ? lines.length : codeIndexes[position + 1];
      const product = buildProductFromBlock(codeIdx, blockStart, blockEnd);
      if (product) products.push(product);
    });
  } else {
    lines.forEach((line, index) => {
      const price = extractPriceFromLine(line);
      if (price === null) return;
      let name = '';
      for (let i = index - 1; i >= 0; i -= 1) {
        if (isLikelyNameLine(lines[i])) {
          name = cleanupRecognizedName(lines[i]);
          break;
        }
      }
      if (!name) return;
      const qty = extractQtyFromLine(lines[index + 1] || '') || 1;
      products.push({
        name,
        cardCode: '',
        unitPrice: price,
        qty,
        cost: round2(price * qty),
        status: '未售出',
        source: '截图识别',
        sells: [],
        profit: null
      });
    });
  }

  const seen = new Set();
  return products.filter(item => {
    const key = [item.name, item.cardCode, item.unitPrice, item.qty].join('|');
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

async function enrichRecognizedItemsWithImages(items) {
  const tasks = (items || []).map(async item => {
    if (!item.cardCode) return item;
    try {
      const result = await lookupCardImageViaEdgeFunction(item.cardCode);
      return {
        ...item,
        imageUrl: result.imageUrl || item.imageUrl || null
      };
    } catch (_error) {
      const fallbackUrl = buildTcgMikImageUrl(item.cardCode);
      return {
        ...item,
        imageUrl: fallbackUrl || item.imageUrl || null
      };
    }
  });
  return Promise.all(tasks);
}

// 缓存：图片base64前缀 -> 编号（从cardimg文件夹动态匹配，支持png/webp）
let cardCodeCache = null;
let cardCacheReady = false;

async function buildCardCodeCache() {
  if (cardCodeCache) return;
  cardCodeCache = {};
  try {
    // 动态扫描 cardimg 文件夹
    const resp = await fetch('./cardimg/');
    if (!resp.ok) throw new Error('fetch failed');
    const text = await resp.text();
    const matches = text.matchAll(/href="([A-Za-z0-9.]+\.(?:png|webp))"/g);
    const fileNames = [...matches].map(m => m[1]);
    
    // 预加载所有图片的 base64 前缀
    const promises = fileNames.map(async name => {
      try {
        const r = await fetch('./cardimg/' + name);
        if (!r.ok) return;
        const blob = await r.blob();
        const base64 = await new Promise(res => {
          const reader = new FileReader();
          reader.onloadend = () => res(reader.result);
          reader.readAsDataURL(blob);
        });
        const code = name.replace(/\.(png|webp)$/i, '');
        // 存多个长度的前缀以提高匹配精度
        cardCodeCache[base64.slice(0, 80)] = code;
        cardCodeCache[base64.slice(0, 50)] = code;
      } catch {}
    });
    await Promise.all(promises);
    cardCacheReady = true;
  } catch {
    console.warn('cardimg 缓存构建失败，可能未通过服务器访问');
    cardCacheReady = true;
  }
}

async function getCardCodeFromCache(url) {
  if (!url || !url.startsWith('data:')) return '';
  await buildCardCodeCache();
  for (const [key, code] of Object.entries(cardCodeCache)) {
    if (url.startsWith(key)) return code;
  }
  return '';
}

// 从 imageUrl 提取编号：支持URL路径和base64格式
const extractCardCode = (url) => {
  if (!url) return '';
  // 1. 尝试从URL路径提取 (cardimg/CSM2bC-034.png -> CSM2bC-034)
  const match = url.match(/cardimg\/([^/?#]+)\.(?:png|webp|jpg|jpeg)/i);
  if (match) return decodeCardCodeFromFileStem(match[1]);
  return ''; // base64的编号由getCardCodeFromCache异步获取
};

function ScreenshotImportModal({ onImport, onClose, showToast }) {
  const [file, setFile] = useState(null);
  const [previewUrl, setPreviewUrl] = useState('');
  const [loading, setLoading] = useState(false);
  const [progressText, setProgressText] = useState('');
  const [rawText, setRawText] = useState('');
  const [drafts, setDrafts] = useState([]);
  const [lastMethod, setLastMethod] = useState('');

  function updateDraft(index, field, value) {
    setDrafts(prev => prev.map((item, idx) => {
      if (idx !== index) return item;
      const next = { ...item, [field]: value };
      const unitPrice = field === 'unitPrice' ? (value === '' ? null : parseFloat(value)) : item.unitPrice;
      const qty = field === 'qty' ? (value === '' ? 1 : parseInt(value, 10) || 1) : item.qty;
      next.unitPrice = unitPrice;
      next.qty = qty;
      next.cost = unitPrice === null ? 0 : round2(unitPrice * qty);
      return next;
    }));
  }

  function removeDraft(index) {
    setDrafts(prev => prev.filter((_, idx) => idx !== index));
  }

  function handleFileChange(selectedFile) {
    if (!selectedFile) return;
    setFile(selectedFile);
    setRawText('');
    setDrafts([]);
    setLastMethod('');
    const reader = new FileReader();
    reader.onload = ev => setPreviewUrl(String(ev.target?.result || ''));
    reader.readAsDataURL(selectedFile);
  }

  function normalizeRecognizedDrafts(items) {
    return items
      .map(item => ({
        ...item,
        name: String(item.name || '').trim(),
        cardCode: String(item.cardCode || '').trim(),
        note: String(item.note || '').trim(),
        sourceText: String(item.sourceText || '').trim(),
        unitPrice: item.unitPrice === '' ? null : item.unitPrice,
        qty: parseInt(item.qty, 10) || 1,
        status: item.status || '未售出',
        source: item.source || '截图识别',
        sells: [],
        profit: null,
        cost: item.unitPrice === null || item.unitPrice === '' ? 0 : round2((parseFloat(item.unitPrice) || 0) * (parseInt(item.qty, 10) || 1))
      }))
      .filter(item => item.name);
  }

  async function handleRecognizeLocal() {
    if (!file) {
      showToast('请先上传截图');
      return;
    }
    if (!window.Tesseract) {
      showToast('OCR 组件加载失败，请刷新后重试');
      return;
    }

    setLoading(true);
    setLastMethod('本地OCR');
    setProgressText('正在识别文字...');
    setRawText('');
    setDrafts([]);

    try {
      const result = await window.Tesseract.recognize(file, 'chi_sim+eng', {
        logger(message) {
          if (message?.status === 'recognizing text') {
            const pct = message.progress ? Math.round(message.progress * 100) : 0;
            setProgressText(`正在识别文字... ${pct}%`);
          } else if (message?.status) {
            setProgressText(String(message.status));
          }
        }
      });
      const text = result?.data?.text || '';
      const words = Array.isArray(result?.data?.words) ? result.data.words : [];
      setRawText(text);
      const parsedFromWords = parseProductsFromOcrWords(words);
      const parsed = parsedFromWords.length > 0 ? parsedFromWords : parseProductsFromScreenshotText(text);
      const enriched = await enrichRecognizedItemsWithImages(parsed);
      setDrafts(enriched);
      if (enriched.length === 0) {
        showToast('没有识别出可导入的商品，请检查截图是否清晰');
      } else {
        showToast(`已识别 ${enriched.length} 条商品，请确认后导入`);
      }
    } catch (error) {
      console.error('截图识别失败', error);
      showToast(error?.message || '截图识别失败');
    } finally {
      setLoading(false);
      setProgressText('');
    }
  }

  async function handleRecognizeAi() {
    if (!file || !previewUrl) {
      showToast('请先上传截图');
      return;
    }

    setLoading(true);
    setLastMethod('AI识别');
    setProgressText('正在调用 AI 识别截图...');
    setRawText('');
    setDrafts([]);

    try {
      const result = await extractScreenshotItemsViaAi(previewUrl);
      const normalized = normalizeRecognizedDrafts(result.items || []);
      const enriched = await enrichRecognizedItemsWithImages(normalized);
      setDrafts(enriched);
      setRawText(result.rawText || '');
      if (enriched.length === 0) {
        showToast('AI 没有识别出可导入商品，请换一张更清晰的截图试试');
      } else {
        showToast(`AI 已识别 ${enriched.length} 条商品，请确认后导入`);
      }
    } catch (error) {
      console.error('AI 截图识别失败', error);
      showToast(error?.message || 'AI 截图识别失败');
    } finally {
      setLoading(false);
      setProgressText('');
    }
  }

  function handleImport() {
    const normalized = normalizeRecognizedDrafts(drafts);

    if (normalized.length === 0) {
      showToast('请至少保留一条有效商品');
      return;
    }
    onImport(normalized);
  }

  return (
    <ModalPortal>
      <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
        <div className="modal" style={{maxWidth: 860}}>
          <div className="modal-header">
            <div className="modal-title">🧠 截图识别新增</div>
            <button className="modal-close" onClick={onClose}>×</button>
          </div>
          <div className="modal-body">
          <div className="modal-section-title">上传截图</div>
          <div style={{display:'flex', gap:16, alignItems:'flex-start', flexWrap:'wrap'}}>
              <label style={{minWidth:180, minHeight:180, border:'1px dashed var(--border-bright)', borderRadius:24, background:'rgba(17,17,17,0.92)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', overflow:'hidden'}}>
              {previewUrl ? (
                <img src={previewUrl} alt="截图预览" style={{width:'100%', height:'100%', objectFit:'contain', background:'#111111'}} />
              ) : (
                <div style={{textAlign:'center', color:'var(--text-2)', padding:16}}>
                  <div style={{fontSize:32, marginBottom:8}}>🖼️</div>
                  <div>点击上传截图</div>
                </div>
              )}
              <input type="file" accept="image/*" style={{display:'none'}} onChange={e => handleFileChange(e.target.files?.[0])} />
            </label>
            <div style={{flex:'1 1 320px', minWidth:260}}>
              <div style={{fontSize:13, color:'var(--text-2)', lineHeight:1.7, marginBottom:12}}>
                支持识别截图里的卡名、编号、价格和数量。推荐优先用 AI 识别；本地 OCR 继续保留，适合作为备用方案。
              </div>
              <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
                <button className="btn btn-primary" onClick={handleRecognizeAi} disabled={!file || loading}>
                  {loading && lastMethod === 'AI识别' ? 'AI 识别中...' : 'AI识别（推荐）'}
                </button>
                <button className="btn btn-secondary" onClick={handleRecognizeLocal} disabled={!file || loading}>
                  {loading && lastMethod === '本地OCR' ? 'OCR 识别中...' : '本地OCR'}
                </button>
                <label className="btn btn-secondary" style={{cursor:'pointer'}}>
                  重新选图
                  <input type="file" accept="image/*" style={{display:'none'}} onChange={e => handleFileChange(e.target.files?.[0])} />
                </label>
              </div>
              {progressText && (
                <div style={{marginTop:10, fontSize:12, color:'var(--primary)', fontWeight:700}}>{progressText}</div>
              )}
            </div>
          </div>

          {drafts.length > 0 && (
            <>
              <div className="modal-section-title" style={{marginTop:20}}>识别结果确认</div>
              {lastMethod && (
                <div style={{marginBottom:10, fontSize:12, color:'var(--text-2)'}}>
                  当前结果来源：<span style={{color:'var(--primary)', fontWeight:800}}>{lastMethod}</span>
                </div>
              )}
              <div style={{display:'flex', flexDirection:'column', gap:12}}>
                {drafts.map((item, index) => (
                  <div key={`${item.cardCode || item.name}-${index}`} style={{border:'1px solid var(--border)', borderRadius:22, padding:14, background:'rgba(17,17,17,0.92)'}}>
                    <div style={{display:'grid', gridTemplateColumns:'72px 1.4fr 1fr 0.8fr 0.7fr auto', gap:10, alignItems:'center'}}>
                      <div style={{width:72, height:72, borderRadius:18, border:'1px solid var(--border)', background:'#111111', display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden'}}>
                        {item.imageUrl ? (
                          <img src={item.imageUrl} alt={item.name} style={{width:'100%', height:'100%', objectFit:'contain'}} />
                        ) : (
                          <span style={{fontSize:26}}>🃏</span>
                        )}
                      </div>
                      <input className="form-input" value={item.name} onChange={e => updateDraft(index, 'name', e.target.value)} placeholder="卡牌名称" />
                      <input className="form-input" value={item.cardCode || ''} onChange={e => updateDraft(index, 'cardCode', e.target.value)} placeholder="卡牌编号" />
                      <input className="form-input" type="number" step="0.01" value={item.unitPrice ?? ''} onChange={e => updateDraft(index, 'unitPrice', e.target.value)} placeholder="单价" />
                      <input className="form-input" type="number" min="1" value={item.qty ?? 1} onChange={e => updateDraft(index, 'qty', e.target.value)} placeholder="数量" />
                      <button className="btn btn-secondary" onClick={() => removeDraft(index)} style={{color:'#f87171', borderColor:'rgba(248,81,73,0.3)'}}>删除</button>
                    </div>
                    <div style={{marginTop:8, fontSize:12, color:'var(--text-2)'}}>
                      成本会按 单价 × 数量 自动生成，导入后状态默认设为“未售出”。
                    </div>
                    {(item.note || item.sourceText) && (
                      <div style={{marginTop:8, display:'flex', gap:12, flexWrap:'wrap', fontSize:12, color:'var(--text-2)'}}>
                        {item.note ? <span>备注：{item.note}</span> : null}
                        {item.sourceText ? <span>识别依据：{item.sourceText}</span> : null}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </>
          )}

          {rawText && (
            <>
              <div className="modal-section-title" style={{marginTop:20}}>{lastMethod === 'AI识别' ? 'AI 原始输出' : 'OCR 原始文本'}</div>
              <textarea
                className="form-input"
                style={{minHeight:140, resize:'vertical', fontFamily:'var(--mono, monospace)'}}
                value={rawText}
                onChange={e => setRawText(e.target.value)}
              />
            </>
          )}
          </div>
          <div className="modal-footer">
            <button className="btn btn-secondary" onClick={onClose}>取消</button>
            <button className="btn btn-primary" onClick={handleImport} disabled={drafts.length === 0}>导入 {drafts.length || ''} 条记录</button>
          </div>
        </div>
      </div>
    </ModalPortal>
  );
}

// Add Card Form — 简化版
function AddCardForm({ onAdd, onCancel }) {
  const [form, setForm] = useState({
    name: '', unitPrice: '', qty: '1', cost: '', cardLanguage: '',
    status: '未售出',
    sells: []
  });
  
  // 成本自动计算 = 单价 × 数量
  function update(field, value) {
    setForm(prev => {
      const next = { ...prev, [field]: value };
      if (field === 'unitPrice' || field === 'qty') {
        const price = parseFloat(field === 'unitPrice' ? value : prev.unitPrice) || 0;
        const qty = parseInt(field === 'qty' ? value : prev.qty) || 1;
        next.cost = String((price * qty).toFixed(2));
      }
      return next;
    });
  }
  
  function handleSubmit(e) {
    e.preventDefault();
    if (!form.name.trim()) return;
    const cost = form.cost === '' ? 0 : parseFloat(form.cost);
    const totalSell = form.sells.reduce((sum, s) => sum + (s.total || 0), 0);

      name: form.name.trim(),
      unitPrice: form.unitPrice === '' ? null : parseFloat(form.unitPrice),
      qty: form.qty === '' ? 1 : parseInt(form.qty),
      cost,
      cardLanguage: form.cardLanguage,
      sells: form.sells,
      status: form.status,
      source: '手动添加',
      profit: totalSell > 0 ? round2(totalSell - cost) : null
    });
    setForm({ name: '', unitPrice: '', qty: '1', cost: '', cardLanguage: '', status: '未售出', sells: [] });
  }
  return (
    <div className="add-form">

        <form className="add-form-grid" onSubmit={handleSubmit}>
          <div className="form-group">
            <label className="form-label">卡牌名称 *</label>
            <input className="form-input" value={form.name} onChange={e => update('name', e.target.value)} placeholder="如：梦幻ex sar" required />
          </div>
          <div className="form-group">
            <label className="form-label">单价 (¥)</label>
            <input className="form-input" type="number" step="0.01" value={form.unitPrice} onChange={e => update('unitPrice', e.target.value)} placeholder="0.00" />
          </div>
          <div className="form-group">
            <label className="form-label">语言版本</label>
            <select className="form-input" value={form.cardLanguage} onChange={e => update('cardLanguage', e.target.value)}>
              <option value="">未标识</option>
              <option value="宝可梦简中">宝可梦简中</option>
              <option value="宝可梦日文">宝可梦日文</option>
              <option value="宝可梦英文">宝可梦英文</option>
              <option value="宝可梦繁中">宝可梦繁中</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">数量</label>
            <input className="form-input" type="number" value={form.qty} onChange={e => update('qty', e.target.value)} min="1" />
          </div>
          <div className="form-group">
            <label className="form-label">成本 (¥) <span style={{fontSize:11,color:'var(--text-3)'}}>自动=单价×数量</span></label>
            <input className="form-input" type="number" step="0.01" value={form.cost} onChange={e => update('cost', e.target.value)} placeholder="自动计算" />
          </div>
          <div className="form-group" style={{gridColumn:'1 / -1'}}>
            <label className="form-label">状态</label>
            <div className="status-options">
              <div className={`status-option ${form.status === '未售出' ? 'selected-unsold' : ''}`} onClick={() => update('status', '未售出')}>未售出</div>
              <div className={`status-option ${form.status === '已售出' ? 'selected-sold' : ''}`} onClick={() => update('status', '已售出')}>已售出</div>
              <div className={`status-option ${form.status === '待签收' ? 'selected-signed' : ''}`} onClick={() => update('status', '待签收')}>待签收</div>

            <button type="submit" className="btn btn-primary" style={{ width: '100%' }}>添加</button>

          <div className="form-group">
            <button type="button" className="btn btn-secondary" style={{ width: '100%' }} onClick={onCancel}>取消</button>

        </form>

  );
